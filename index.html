<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>詩仙寶藏之門</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #332211;
      --paper: #fff7dc;
      --gold: #f6b83d;
      --jade: #1c9b83;
      --rose: #d95c57;
      --night: #17364d;
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(246, 184, 61, 0.32), transparent 18rem),
        radial-gradient(circle at 82% 12%, rgba(98, 183, 214, 0.34), transparent 18rem),
        #0f3147;
      overflow: hidden;
    }
    button { color: inherit; font: inherit; }
    .cover {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: grid;
      place-items: center;
      background: #071521;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.75s ease, visibility 0.75s ease;
    }
    .cover.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-hint {
      position: absolute;
      left: 50%;
      bottom: clamp(24px, 6vh, 68px);
      transform: translateX(-50%);
      min-height: 44px;
      display: grid;
      place-items: center;
      padding: 10px 18px;
      border-radius: 999px;
      color: #fff8df;
      background: rgba(15, 22, 30, 0.62);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      font-weight: 950;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px clamp(12px, 2.5vw, 28px);
      pointer-events: none;
    }
    .title-card,
    .info-panel {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      color: #fff8df;
      background: rgba(23, 54, 77, 0.74);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    .title-card {
      width: min(520px, 100%);
      padding: 12px 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 5px 0 0;
      color: rgba(255, 248, 223, 0.86);
      font-weight: 900;
      line-height: 1.35;
    }
    .info-panel {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: end;
      padding: 10px;
    }
    .held {
      min-height: 40px;
      display: inline-grid;
      place-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      color: #116c75;
      background: #e9fffb;
      font-weight: 950;
      white-space: nowrap;
    }
    .btn {
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      padding: 9px 14px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      color: #39220f;
      background: linear-gradient(135deg, #fff2a8, var(--gold));
      font-weight: 950;
      text-decoration: none;
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.16);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .btn.secondary {
      color: #fff8df;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: none;
    }
    .map-stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 10px;
    }
    .map-container {
      position: relative;
      width: min(100%, calc((100vh - 20px) * 1536 / 1024));
      max-width: 1536px;
      max-height: calc(100vh - 20px);
      aspect-ratio: 1536 / 1024;
      filter: drop-shadow(0 24px 54px rgba(0, 0, 0, 0.32));
    }
    .map-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hotspot {
      position: absolute;
      z-index: 3;
      border: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0);
      cursor: pointer;
      transition: box-shadow 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }
    .hotspot:hover,
    .hotspot:focus-visible {
      outline: none;
      background: rgba(255, 246, 166, 0.14);
      box-shadow: 0 0 26px rgba(255, 230, 116, 0.82), inset 0 0 18px rgba(255, 255, 255, 0.24);
      transform: scale(1.012);
    }
    .hotspot.poem { left: 1.2%; top: 1.4%; width: 31.5%; height: 44.3%; }
    .hotspot.word { left: 68.2%; top: 1.7%; width: 30.6%; height: 44.2%; }
    .hotspot.image { left: 1.3%; top: 53.3%; width: 31.2%; height: 40.2%; }
    .hotspot.poet { left: 67.8%; top: 53.5%; width: 31.2%; height: 40.0%; }
    .hotspot.gate { left: 38.0%; top: 18.2%; width: 24.2%; height: 47.0%; border-radius: 22px; }
    .stamp {
      position: absolute;
      z-index: 4;
      width: clamp(32px, 4vw, 62px);
      height: clamp(32px, 4vw, 62px);
      display: none;
      place-items: center;
      border: 4px solid #fff8df;
      border-radius: 50%;
      color: #063b2f;
      background: #72efad;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25), 0 0 24px rgba(114, 239, 173, 0.82);
      font-size: clamp(1.2rem, 2.4vw, 2.2rem);
      font-weight: 950;
      pointer-events: none;
    }
    .stamp.show { display: grid; }
    .stamp.poem { left: 28.4%; top: 15.0%; }
    .stamp.word { left: 94.0%; top: 15.0%; }
    .stamp.image { left: 28.5%; top: 64.2%; }
    .stamp.poet { left: 94.0%; top: 64.3%; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(22, 38, 50, 0.74);
    }
    .modal.show { display: grid; }
    .dialog {
      width: min(980px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: clamp(16px, 3vw, 26px);
      border: 3px solid rgba(246, 184, 61, 0.78);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
    }
    .dialog h2 { margin: 0 0 10px; font-size: clamp(1.5rem, 3vw, 2.25rem); }
    .dialog p { margin: 0 0 14px; font-weight: 900; line-height: 1.55; }
    .gate-game.hide { display: none; }
    .slots {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .slot {
      min-height: 134px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 10px;
      border: 3px dashed rgba(112, 70, 24, 0.32);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.44);
      text-align: center;
      font-weight: 950;
    }
    .slot.correct {
      border-style: solid;
      border-color: rgba(28, 155, 131, 0.9);
      background: #e9fff6;
      box-shadow: 0 0 20px rgba(28, 155, 131, 0.2);
    }
    .slot.wrong { animation: wrongFlash 0.38s ease; }
    .slot-body {
      min-height: 76px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.44);
      color: rgba(51, 34, 17, 0.52);
    }
    .backpack {
      min-height: 128px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px;
      border: 2px solid rgba(112, 70, 24, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.44);
    }
    .badge {
      min-width: 150px;
      min-height: 62px;
      display: inline-grid;
      place-items: center;
      padding: 10px 12px;
      border: 2px solid rgba(112, 70, 24, 0.2);
      border-radius: 8px;
      color: #39220f;
      background: linear-gradient(135deg, #fff7c4, var(--gold));
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.14);
      cursor: grab;
      user-select: none;
      touch-action: none;
      font-weight: 950;
      text-align: center;
    }
    .badge:active { cursor: grabbing; }
    .badge.placed { cursor: default; box-shadow: none; }
    .drag-ghost {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      width: min(220px, 72vw);
      transform: translate(-50%, -50%) scale(1.04);
      opacity: 0.92;
    }
    .actions {
      display: flex;
      justify-content: end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .complete {
      display: none;
      text-align: center;
      padding: 18px;
    }
    .complete.show { display: block; }
    .trophy {
      width: min(210px, 62vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border: 8px solid #c83f35;
      border-radius: 50%;
      color: #b6342f;
      background: #fff2a8;
      font-size: clamp(1.5rem, 5vw, 2.35rem);
      font-weight: 950;
      line-height: 1.18;
      box-shadow: 0 0 28px rgba(246, 184, 61, 0.54);
    }
    .story-overlay {
      position: fixed;
      inset: 0;
      z-index: 95;
      display: none;
      place-items: center;
      padding: clamp(14px, 3vw, 32px);
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 232, 135, 0.34), transparent 16rem),
        radial-gradient(circle at 78% 72%, rgba(119, 205, 190, 0.28), transparent 17rem),
        rgba(18, 32, 47, 0.86);
    }
    .story-overlay.show { display: grid; }
    .story-book {
      width: min(1040px, 100%);
      min-height: min(680px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto minmax(280px, 1fr) auto;
      gap: clamp(12px, 2vw, 18px);
      padding: clamp(16px, 3vw, 28px);
      border: 4px solid rgba(116, 74, 35, 0.34);
      border-radius: 12px;
      color: #372111;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.16) 1px, transparent 1px),
        linear-gradient(0deg, rgba(116,74,35,0.08) 1px, transparent 1px),
        #fff2bf;
      background-size: 18px 18px, 22px 22px, auto;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.36);
    }
    .story-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .story-head h2 {
      margin: 0;
      font-size: clamp(1.45rem, 3.2vw, 2.8rem);
      letter-spacing: 0;
    }
    .story-kicker {
      min-height: 34px;
      display: inline-grid;
      place-items: center;
      padding: 6px 12px;
      border: 2px solid rgba(116, 74, 35, 0.2);
      border-radius: 999px;
      color: #6d3d1d;
      background: rgba(255, 255, 255, 0.44);
      font-weight: 950;
    }
    .story-scene {
      position: relative;
      overflow: hidden;
      min-height: 320px;
      border: 4px solid rgba(116, 74, 35, 0.22);
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 246, 184, 0.88), transparent 16rem),
        linear-gradient(#a9dff5 0 48%, #f6dca1 49% 100%);
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.22);
    }
    .story-scene::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.26;
      background:
        repeating-linear-gradient(8deg, rgba(116, 74, 35, 0.13) 0 2px, transparent 2px 9px),
        repeating-linear-gradient(96deg, rgba(255, 255, 255, 0.18) 0 1px, transparent 1px 7px);
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .story-scene::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -12%;
      height: 32%;
      border-radius: 50% 50% 0 0;
      background: rgba(86, 155, 104, 0.48);
      filter: blur(1px);
    }
    .story-image {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .story-scene.has-image::before {
      z-index: 2;
      opacity: 0.16;
    }
    .story-scene.has-image::after { display: none; }
    .story-scene[data-scene="seals"] { background: linear-gradient(#8dd3ef 0 42%, #f4c986 43% 100%); }
    .story-scene[data-scene="door"] { background: linear-gradient(#88d5f4 0 54%, #f9dfaa 55% 100%); }
    .story-scene[data-scene="poets"] { background: radial-gradient(circle at 50% 25%, #fff3b8, transparent 14rem), linear-gradient(#7097d1, #d9e7ff 56%, #f6d69e); }
    .story-scene[data-scene="map"] { background: linear-gradient(#ffe0a2 0 42%, #c8edbd 43% 100%); }
    .story-scene[data-scene="ending"] { background: linear-gradient(#ffd37c 0 45%, #8fc68f 46% 100%); }
    .sky-line {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: none;
    }
    .story-art {
      position: absolute;
      z-index: 4;
      display: grid;
      place-items: center;
      font-weight: 950;
      text-align: center;
    }
    .stone-door {
      left: 50%;
      bottom: 14%;
      width: min(280px, 34vw);
      height: min(330px, 38vw);
      transform: translateX(-50%);
      border: 10px solid #8b725b;
      border-radius: 46% 46% 8px 8px;
      color: #fff9dc;
      background: linear-gradient(90deg, #8a7a68 0 49%, #6d5e50 50% 100%);
      box-shadow: 0 0 48px rgba(255, 213, 83, 0.72);
    }
    .treasure-slot {
      position: absolute;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 4px solid #ffe59a;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      box-shadow: 0 0 22px rgba(255, 223, 99, 0.85);
    }
    .treasure-slot:nth-child(1) { left: 18%; top: 28%; }
    .treasure-slot:nth-child(2) { right: 18%; top: 28%; }
    .treasure-slot:nth-child(3) { left: 22%; bottom: 24%; }
    .treasure-slot:nth-child(4) { right: 22%; bottom: 24%; }
    .child {
      left: 16%;
      bottom: 13%;
      width: 110px;
      height: 150px;
      border-radius: 48px 48px 20px 20px;
      color: #7b3f23;
      background: #ffe0b2;
      box-shadow: inset 0 -68px #79b7d8, 0 10px 20px rgba(70, 46, 26, 0.18);
    }
    .child::before {
      content: "";
      position: absolute;
      top: 20px;
      width: 48px;
      height: 32px;
      border-radius: 0 0 28px 28px;
      background: #4d2c1c;
    }
    .scroll-road {
      left: 50%;
      bottom: 7%;
      width: min(440px, 48vw);
      height: 110px;
      transform: translateX(-50%) rotate(-2deg);
      border: 4px solid rgba(122, 78, 35, 0.36);
      border-radius: 999px 999px 28px 28px;
      background: #fff4c4;
      box-shadow: 0 12px 22px rgba(80, 51, 22, 0.18);
    }
    .cloud-step {
      position: absolute;
      z-index: 3;
      left: 48%;
      bottom: 18%;
      width: 44%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 28px -34px 0 rgba(255,255,255,0.65), 64px -68px 0 rgba(255,255,255,0.5), 102px -102px 0 rgba(255,255,255,0.45);
      transform: rotate(-22deg);
    }
    .poet-stars {
      inset: 0;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 9% 12% 18%;
      gap: 12px;
    }
    .poet-stars span {
      display: grid;
      place-items: center;
      min-height: 92px;
      border-radius: 50%;
      color: #fff8d6;
      background: rgba(255, 244, 181, 0.24);
      box-shadow: 0 0 28px rgba(255, 241, 153, 0.55);
      text-shadow: 0 2px 12px rgba(36, 49, 87, 0.52);
    }
    .new-map {
      left: 50%;
      bottom: 14%;
      width: min(500px, 58vw);
      min-height: 210px;
      transform: translateX(-50%) rotate(-3deg);
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 22px;
      border: 6px solid #a86b35;
      border-radius: 12px;
      background: #fff0b3;
      box-shadow: 0 16px 28px rgba(78, 50, 25, 0.2);
    }
    .new-map span {
      padding: 10px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
    }
    .star-path {
      inset: 0;
      grid-template-columns: 1fr;
      align-items: start;
      padding-top: 10%;
      color: #fff9cd;
      font-size: clamp(1.6rem, 5vw, 3.5rem);
      text-shadow: 0 0 18px rgba(255, 243, 151, 0.85);
    }
    .story-text {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-left: 6px solid rgba(246, 184, 61, 0.82);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.45);
      font-size: clamp(1.05rem, 2.3vw, 1.38rem);
      font-weight: 950;
      line-height: 1.7;
    }
    .story-text p { margin: 0; }
    .story-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .story-hint {
      color: rgba(55, 33, 17, 0.72);
      font-weight: 950;
    }
    .ending-card {
      position: fixed;
      inset: 0;
      z-index: 110;
      display: none;
      place-items: center;
      padding: 24px;
      color: #ffeaa0;
      background: #070706;
      text-align: center;
      cursor: pointer;
    }
    .ending-card.show { display: grid; animation: fadeIn 0.65s ease both; }
    .ending-card h2 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 6vw, 4.2rem);
      letter-spacing: 0;
      text-shadow: 0 0 22px rgba(255, 221, 95, 0.72);
    }
    .ending-card p {
      margin: 8px 0;
      color: #fff3c3;
      font-size: clamp(1.05rem, 2.5vw, 1.55rem);
      font-weight: 950;
      line-height: 1.7;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes wrongFlash {
      0%, 100% { transform: translateX(0); border-color: rgba(112, 70, 24, 0.32); background: rgba(255, 255, 255, 0.44); }
      50% { transform: translateX(5px); border-color: var(--rose); background: #ffe0dc; }
    }
    @media (max-width: 960px) {
      body { overflow: auto; }
      .map-stage { min-height: 100svh; padding-top: 88px; }
      .map-container {
        width: min(100%, calc((100svh - 108px) * 1536 / 1024));
        max-height: calc(100svh - 108px);
      }
      .slots { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .topbar {
        position: sticky;
        grid-template-columns: 1fr;
        padding: 8px;
      }
      .title-card { width: 100%; }
      .info-panel { justify-content: space-between; }
      .map-stage { padding-top: 8px; }
      .map-container {
        width: min(100%, calc((100svh - 172px) * 1536 / 1024));
        max-height: calc(100svh - 172px);
      }
      .slots { grid-template-columns: 1fr; }
      .btn, .held { min-height: 40px; }
      .story-book { min-height: calc(100svh - 28px); }
      .story-scene { min-height: 280px; }
      .child { left: 8%; transform: scale(0.82); transform-origin: bottom left; }
      .stone-door { width: 180px; height: 230px; }
      .treasure-slot { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <div class="cover" id="cover" aria-label="遊戲開場封面">
    <img src="cover.png" alt="詩仙寶藏之門開場封面">
    <div class="cover-hint">點一下開始冒險</div>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="title-card">
        <h1>詩仙寶藏之門</h1>
        <p class="subtitle">集滿四個寶物，開啟詩仙寶藏</p>
      </div>
      <div class="info-panel">
        <span class="held" id="heldCount">持有 0 / 4</span>
        <button class="btn secondary" id="clearBtn" type="button">🔄 清除進度</button>
      </div>
    </header>

    <section class="map-stage" aria-label="唐詩大冒險地圖">
      <div class="map-container">
        <img class="map-img" src="map-bg.png" alt="唐詩大冒險地圖">
        <button class="hotspot poem" data-action="level" data-index="0" aria-label="開啟詩句排序" type="button"></button>
        <button class="hotspot word" data-action="level" data-index="1" aria-label="開啟唐詩填字遊戲" type="button"></button>
        <button class="hotspot image" data-action="level" data-index="2" aria-label="開啟快圖猜詩境" type="button"></button>
        <button class="hotspot poet" data-action="level" data-index="3" aria-label="開啟詩境偵探社" type="button"></button>
        <button class="hotspot gate" data-action="gate" aria-label="開啟詩仙寶藏之門" type="button"></button>
        <span class="stamp poem" data-stamp="0">✓</span>
        <span class="stamp word" data-stamp="1">✓</span>
        <span class="stamp image" data-stamp="2">✓</span>
        <span class="stamp poet" data-stamp="3">✓</span>
      </div>
    </section>
  </main>

  <div class="story-overlay" id="storyOverlay" role="dialog" aria-modal="true" aria-labelledby="storyTitle">
    <article class="story-book">
      <div class="story-head">
        <div>
          <span class="story-kicker" id="storyKicker">結局過場</span>
          <h2 id="storyTitle">《詩光未盡》</h2>
        </div>
        <button class="btn secondary" id="storyCloseBtn" type="button">返回地圖</button>
      </div>
      <div class="story-scene" id="storyScene" data-scene="seals">
        <img class="story-image" id="storyImage" src="" alt="">
        <div class="sky-line" id="storySky"></div>
        <div class="story-art" id="storyArt"></div>
      </div>
      <div class="story-text" id="storyText"></div>
      <div class="story-actions">
        <span class="story-hint" id="storyHint">彩色蠟筆畫冊翻開了一頁。</span>
        <button class="btn" id="storyNextBtn" type="button">繼續</button>
      </div>
    </article>
  </div>

  <div class="ending-card" id="endingCard" role="button" tabindex="0" aria-label="結局畫面，點擊返回主畫面">
    <div>
      <h2>✨ 冒險完成 ✨</h2>
      <p>《四印之謎：唐詩冒險王》</p>
      <p>感謝你的旅程</p>
      <p>（點擊返回主畫面）</p>
    </div>
  </div>

  <audio id="storyMusic" src="Ink_and_Morning_Dew.mp3" preload="auto" loop></audio>

  <div class="modal" id="gateModal" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
    <div class="dialog">
      <div class="gate-game" id="gateGame">
        <h2 id="gateTitle">🔒 通關大門</h2>
        <p>把背包裡的憑證拖到正確凹槽。持有不足 4 個也可以先試，四個都放對才會開門。</p>
        <div class="slots" id="slots"></div>
        <h3>背包欄</h3>
        <div class="backpack" id="backpack"></div>
        <div class="actions">
          <button class="btn secondary" id="resetSlotsBtn" type="button">重置凹槽</button>
          <button class="btn secondary" id="closeModalBtn" type="button">關閉</button>
        </div>
      </div>
      <div class="complete" id="completeView">
        <div class="trophy">詩仙<br>寶藏</div>
        <h2>🏆 冒險完成！</h2>
        <p id="timeText">總冒險時長：00 分 00 秒</p>
        <button class="btn" id="againBtn" type="button">再次冒險</button>
      </div>
    </div>
  </div>

  <script>
    const levels = [
      {
        key: "cert_dynasty",
        type: "poem",
        icon: "🎴",
        cert: "詩句水晶",
        slot: "詩句",
        href: "失落的詩卷/index.html"
      },
      {
        key: "cert_idiom",
        type: "word",
        icon: "📝",
        cert: "文字玉佩",
        slot: "文字",
        href: "唐詩魔法字陣/index.html"
      },
      {
        key: "cert_warrior",
        type: "image",
        icon: "⚔️",
        cert: "詩意翡翠",
        slot: "詩意",
        href: "詩境尋寶大冒險/index.html"
      },
      {
        key: "cert_poetry",
        type: "poet",
        icon: "⚔️",
        cert: "詩人印章",
        slot: "詩人",
        href: "詩境守護者/index.html"
      }
    ];

    const stories = {
      poem: {
        kicker: "過場圖 1",
        title: "《詩光未盡》 四印歸位",
        scene: "seals",
        image: "四印歸位.png",
        hint: "石門聽見文字的腳步聲。",
        lines: [
          "有些寶藏藏在山裡，",
          "有些寶藏藏在故事裡。",
          "而有些寶藏，一直藏在文字發光的地方。"
        ],
        sky: ["床前明月光", "黃河入海流", "空山不見人", "春風吹又生"],
        art: `
          <div class="story-art stone-door">
            <span class="treasure-slot">水晶</span>
            <span class="treasure-slot">玉佩</span>
            <span class="treasure-slot">翡翠</span>
            <span class="treasure-slot">印章</span>
          </div>
          <div class="story-art child">小勇者</div>
        `
      },
      word: {
        kicker: "過場圖 2",
        title: "《詩光未盡》 詩仙之門開啟",
        scene: "door",
        image: "詩仙之門開啟.png",
        hint: "門後吹來雲海的風。",
        lines: [
          "門後沒有金銀珠寶。",
          "只有無數還沒讀過的故事，",
          "等待下一位旅人發現。"
        ],
        sky: ["雲海", "卷軸", "月光", "遠山"],
        art: `
          <div class="story-art stone-door">詩仙<br>之門</div>
          <div class="cloud-step"></div>
          <div class="story-art child">孩子</div>
        `
      },
      image: {
        kicker: "過場圖 3",
        title: "《詩光未盡》 詩人們的身影",
        scene: "poets",
        image: "詩人們的身影.png",
        hint: "雲裡有山，山裡有詩。",
        lines: [
          "有些人離開了很久。",
          "但他們留下的月光、河流、高樓與春草，",
          "依然在世間慢慢生長。"
        ],
        sky: ["月光", "河流", "高樓", "春草"],
        art: `
          <div class="story-art poet-stars">
            <span>李白</span>
            <span>杜甫</span>
            <span>王維</span>
            <span>白居易</span>
          </div>
        `
      },
      poet: {
        kicker: "過場圖 4",
        title: "《詩光未盡》 新的地圖",
        scene: "map",
        image: "新的地圖png.png",
        hint: "晨光把卷軸邊緣染成金色。",
        lines: [
          "原來旅程從來沒有終點。",
          "每翻開一頁，",
          "世界就會再大一點點。"
        ],
        sky: ["晨光", "新路", "遠方", "下一頁"],
        art: `
          <div class="story-art new-map">
            <span>宋詞森林</span>
            <span>成語山谷</span>
            <span>詩經湖泊</span>
            <span>神話群島</span>
          </div>
          <div class="story-art child">孩子</div>
        `
      },
      ending: {
        kicker: "過場圖 5",
        title: "《詩光未盡》 走向遠方",
        scene: "ending",
        image: "走向遠方.png",
        hint: "四枚寶物在天上變成星星。",
        lines: [
          "故事寫完了。",
          "但路還很長。",
          "而下一首詩，正在前方等你。"
        ],
        sky: ["詩句水晶", "文字玉佩", "詩意翡翠", "詩人印章"],
        art: `
          <div class="story-art star-path">✦　✦　✦　✦</div>
          <div class="story-art scroll-road"></div>
          <div class="story-art child">小背包</div>
        `
      }
    };

    const els = {
      cover: document.getElementById("cover"),
      heldCount: document.getElementById("heldCount"),
      clearBtn: document.getElementById("clearBtn"),
      storyOverlay: document.getElementById("storyOverlay"),
      storyKicker: document.getElementById("storyKicker"),
      storyTitle: document.getElementById("storyTitle"),
      storyScene: document.getElementById("storyScene"),
      storyImage: document.getElementById("storyImage"),
      storySky: document.getElementById("storySky"),
      storyArt: document.getElementById("storyArt"),
      storyText: document.getElementById("storyText"),
      storyHint: document.getElementById("storyHint"),
      storyNextBtn: document.getElementById("storyNextBtn"),
      storyCloseBtn: document.getElementById("storyCloseBtn"),
      endingCard: document.getElementById("endingCard"),
      storyMusic: document.getElementById("storyMusic"),
      gateModal: document.getElementById("gateModal"),
      slots: document.getElementById("slots"),
      backpack: document.getElementById("backpack"),
      gateGame: document.getElementById("gateGame"),
      completeView: document.getElementById("completeView"),
      timeText: document.getElementById("timeText"),
      resetSlotsBtn: document.getElementById("resetSlotsBtn"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      againBtn: document.getElementById("againBtn")
    };

    const placed = new Map();
    let activeDrag = null;
    let storyTarget = null;

    function init() {
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
      initCover();
      renderProgress();
      bindControls();
    }

    function initCover() {
      if (sessionStorage.getItem("adventure_cover_seen") === "true") {
        els.cover.classList.add("hide");
      }
      els.cover.addEventListener("click", () => {
        sessionStorage.setItem("adventure_cover_seen", "true");
        els.cover.classList.add("hide");
      });
    }

    function hasCert(level) {
      return localStorage.getItem(level.key) === "true";
    }

    function heldLevels() {
      return levels.filter(hasCert);
    }

    function renderProgress() {
      els.heldCount.textContent = `持有 ${heldLevels().length} / 4`;
      document.querySelectorAll("[data-stamp]").forEach(stamp => {
        const level = levels[Number(stamp.dataset.stamp)];
        stamp.classList.toggle("show", hasCert(level));
      });
    }

    function openGate() {
      renderGate();
      els.gateModal.classList.add("show");
    }

    function openStory(type, targetHref) {
      const story = stories[type];
      storyTarget = { type, targetHref };
      playStoryMusic();
      els.storyKicker.textContent = story.kicker;
      els.storyTitle.textContent = story.title;
      els.storyScene.dataset.scene = story.scene;
      els.storyScene.classList.toggle("has-image", Boolean(story.image));
      els.storyImage.src = story.image || "";
      els.storyImage.alt = story.title;
      els.storyImage.hidden = !story.image;
      els.storyHint.textContent = story.hint;
      els.storyText.innerHTML = story.lines.map(line => `<p>${line}</p>`).join("");
      els.storySky.innerHTML = "";
      els.storyArt.innerHTML = story.image ? "" : story.art;
      els.storyNextBtn.textContent = type === "ending" ? "看見結局" : "繼續冒險";
      els.storyOverlay.classList.add("show");
    }

    function closeStory() {
      els.storyOverlay.classList.remove("show");
      storyTarget = null;
      stopStoryMusic();
    }

    function continueStory() {
      if (!storyTarget) return;
      if (storyTarget.type === "ending") {
        els.storyOverlay.classList.remove("show");
        storyTarget = null;
        showEndingCard();
        return;
      }
      sessionStorage.setItem("adventure_cover_seen", "true");
      stopStoryMusic();
      window.location.href = storyTarget.targetHref;
    }

    function showEndingCard() {
      els.endingCard.classList.add("show");
    }

    function hideEndingCard() {
      els.endingCard.classList.remove("show");
      stopStoryMusic();
    }

    function playStoryMusic() {
      if (!els.storyMusic) return;
      els.storyMusic.volume = 0.42;
      els.storyMusic.currentTime = 0;
      const playPromise = els.storyMusic.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {});
      }
    }

    function stopStoryMusic() {
      if (!els.storyMusic) return;
      els.storyMusic.pause();
      els.storyMusic.currentTime = 0;
    }

    function renderGate() {
      placed.clear();
      els.gateGame.classList.remove("hide");
      els.completeView.classList.remove("show");
      els.slots.innerHTML = levels.map(level => `
        <div class="slot" data-type="${level.type}">
          <span>${level.slot}</span>
          <div class="slot-body">拖到這裡</div>
        </div>
      `).join("");
      const held = heldLevels();
      els.backpack.innerHTML = held.length
        ? held.map(level => badgeHtml(level)).join("")
        : "<span>背包目前沒有憑證。先完成關卡，再回來開門！</span>";
      bindDrag();
    }

    function badgeHtml(level) {
      return `<div class="badge" draggable="true" data-type="${level.type}">${level.icon} ${level.cert}</div>`;
    }

    function bindDrag() {
      document.querySelectorAll(".badge").forEach(badge => {
        badge.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", badge.dataset.type);
        });
        badge.addEventListener("pointerdown", startPointerDrag);
      });
      document.querySelectorAll(".slot").forEach(slot => {
        slot.addEventListener("dragover", event => event.preventDefault());
        slot.addEventListener("drop", event => {
          event.preventDefault();
          const type = event.dataTransfer.getData("text/plain");
          const badge = Array.from(document.querySelectorAll(".badge:not(.placed)"))
            .find(node => node.dataset.type === type);
          tryPlace(type, slot, badge);
        });
      });
    }

    function startPointerDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      const badge = event.currentTarget;
      if (badge.classList.contains("placed")) return;
      const ghost = badge.cloneNode(true);
      ghost.classList.add("drag-ghost");
      document.body.appendChild(ghost);
      badge.style.opacity = "0.35";
      activeDrag = { badge, ghost, type: badge.dataset.type };
      moveGhost(event.clientX, event.clientY);
      window.addEventListener("pointermove", movePointerDrag);
      window.addEventListener("pointerup", endPointerDrag, { once: true });
    }

    function movePointerDrag(event) {
      if (!activeDrag) return;
      moveGhost(event.clientX, event.clientY);
    }

    function moveGhost(x, y) {
      activeDrag.ghost.style.left = `${x}px`;
      activeDrag.ghost.style.top = `${y}px`;
    }

    function endPointerDrag(event) {
      if (!activeDrag) return;
      const { badge, ghost, type } = activeDrag;
      ghost.remove();
      badge.style.opacity = "";
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const slot = target && target.closest ? target.closest(".slot") : null;
      if (slot) tryPlace(type, slot, badge);
      activeDrag = null;
      window.removeEventListener("pointermove", movePointerDrag);
    }

    function tryPlace(type, slot, badge) {
      if (!badge || badge.classList.contains("placed")) return;
      if (slot.dataset.type !== type) {
        slot.classList.remove("wrong");
        void slot.offsetWidth;
        slot.classList.add("wrong");
        return;
      }
      const body = slot.querySelector(".slot-body");
      body.innerHTML = "";
      body.appendChild(badge);
      slot.classList.add("correct");
      badge.classList.add("placed");
      badge.setAttribute("draggable", "false");
      placed.set(type, true);
      if (placed.size === levels.length) showComplete();
    }

    function showComplete() {
      els.gateGame.classList.add("hide");
      els.completeView.classList.add("show");
      const start = Number(localStorage.getItem("adventure_start") || Date.now());
      const totalSeconds = Math.max(0, Math.floor((Date.now() - start) / 1000));
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      els.timeText.textContent = `總冒險時長：${minutes} 分 ${seconds} 秒`;
    }

    function clearAll(clearSession) {
      localStorage.clear();
      if (clearSession) sessionStorage.clear();
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
      renderProgress();
      if (els.gateModal.classList.contains("show")) renderGate();
    }

    function bindControls() {
      document.querySelectorAll(".hotspot").forEach(hotspot => {
        hotspot.addEventListener("click", () => {
          if (hotspot.dataset.action === "gate") {
            openStory("ending");
            return;
          }
          const level = levels[Number(hotspot.dataset.index)];
          openStory(level.type, level.href);
        });
      });
      els.clearBtn.addEventListener("click", () => clearAll(false));
      els.storyNextBtn.addEventListener("click", continueStory);
      els.storyCloseBtn.addEventListener("click", closeStory);
      els.endingCard.addEventListener("click", hideEndingCard);
      els.endingCard.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") hideEndingCard();
      });
      els.resetSlotsBtn.addEventListener("click", renderGate);
      els.closeModalBtn.addEventListener("click", () => els.gateModal.classList.remove("show"));
      els.againBtn.addEventListener("click", () => {
        clearAll(true);
        window.location.reload();
      });
      els.gateModal.addEventListener("click", event => {
        if (event.target === els.gateModal) els.gateModal.classList.remove("show");
      });
    }

    init();
  </script>
</body>
</html>
