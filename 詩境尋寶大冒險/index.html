<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>詩境尋寶大冒險</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #342312;
      --paper: #fff7dc;
      --gold: #f6b83d;
      --jade: #1c9b83;
      --rose: #d95c57;
      --sky: #62b7d6;
      --night: #17364d;
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(246, 184, 61, 0.34), transparent 17rem),
        radial-gradient(circle at 84% 18%, rgba(98, 183, 214, 0.34), transparent 18rem),
        linear-gradient(180deg, #dff6ed, #ffe8a8 62%, #e5b56a);
      overflow-x: hidden;
    }
    button, select { color: inherit; font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px clamp(12px, 2.5vw, 28px);
      color: #fff8df;
      background: rgba(23, 54, 77, 0.9);
      box-shadow: 0 10px 26px rgba(30, 24, 12, 0.22);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: rgba(255, 248, 223, 0.86);
      font-weight: 900;
      line-height: 1.45;
    }
    .status {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: end;
      flex-wrap: wrap;
    }
    .pill, .btn {
      min-height: 44px;
      display: inline-grid;
      place-items: center;
      padding: 9px 14px;
      border-radius: 8px;
      font-weight: 950;
      white-space: nowrap;
    }
    .pill {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.14);
    }
    .btn {
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, #fff2a8, var(--gold));
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.16);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn.secondary {
      color: #fff8df;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: none;
    }
    .world {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 24px);
      display: grid;
      grid-template-columns: minmax(240px, 310px) minmax(0, 1fr) minmax(240px, 310px);
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      border: 2px solid rgba(112, 70, 24, 0.22);
      border-radius: 8px;
      background: rgba(255, 247, 220, 0.92);
      box-shadow: 0 18px 44px rgba(46, 28, 8, 0.16);
    }
    .side { padding: 16px; }
    .side h2, .side h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      line-height: 1.25;
    }
    .story {
      padding: 14px;
      border-radius: 8px;
      color: #fff8df;
      background:
        radial-gradient(circle at 90% 0%, rgba(246, 184, 61, 0.34), transparent 8rem),
        linear-gradient(145deg, #245b78, #1c9b83);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .story p, .hint-box p, .monster p {
      margin: 0;
      font-weight: 900;
      line-height: 1.6;
    }
    .level-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .level-btn {
      width: 100%;
      min-height: 56px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 32px;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border: 2px solid rgba(101, 65, 22, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      text-align: left;
      font-weight: 950;
    }
    .level-btn.active {
      border-color: rgba(28, 155, 131, 0.84);
      background: #e9fff6;
      box-shadow: 0 0 0 4px rgba(28, 155, 131, 0.15);
    }
    .level-btn.done {
      border-color: rgba(246, 184, 61, 0.9);
      background: #fff1af;
    }
    .level-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .game-panel {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }
    .stage-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 16px 18px 10px;
      background:
        radial-gradient(circle at 90% 0%, rgba(246, 184, 61, 0.32), transparent 9rem),
        linear-gradient(135deg, rgba(255, 255, 255, 0.56), rgba(255, 238, 183, 0.82));
    }
    .stage-head h2 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.25rem);
      line-height: 1.12;
    }
    .message {
      min-height: 54px;
      display: flex;
      align-items: center;
      margin: 12px 18px 0;
      padding: 10px 14px;
      border-radius: 8px;
      background: #e9ffce;
      border: 2px solid rgba(86, 155, 73, 0.25);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 950;
      line-height: 1.45;
    }
    .message.hint {
      color: #7a4619;
      background: #fff0c7;
      border-color: rgba(246, 184, 61, 0.52);
    }
    .message.win {
      color: #744700;
      background: #fff2a8;
      border-color: rgba(246, 184, 61, 0.84);
      box-shadow: 0 0 26px rgba(246, 184, 61, 0.42);
    }
    .scene-wrap {
      padding: 16px 18px 18px;
    }
    .scene-image {
      position: relative;
      overflow: hidden;
      border: 4px solid rgba(112, 70, 24, 0.22);
      border-radius: 8px;
      background: #fff7dc;
      box-shadow: 0 18px 34px rgba(54, 31, 9, 0.18);
      aspect-ratio: 16 / 9;
    }
    .scene-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .scene-image::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.18), transparent 16rem),
        linear-gradient(180deg, transparent 65%, rgba(36, 24, 8, 0.2));
    }
    .crystal {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 2;
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 22px 22px 50% 50%;
      color: #fff8df;
      background: linear-gradient(145deg, #8ae6ff, #1c9b83 55%, #245b78);
      border: 3px solid rgba(255, 255, 255, 0.72);
      font-size: 2rem;
      font-weight: 950;
      box-shadow: 0 0 28px rgba(91, 218, 232, 0.72);
      transform: rotate(45deg);
    }
    .crystal span { transform: rotate(-45deg); }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }
    .choice {
      min-height: 68px;
      border: 2px solid rgba(112, 70, 24, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, #fffdf2, #f6dfaa);
      cursor: pointer;
      font-size: clamp(1.15rem, 2.2vw, 1.55rem);
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.12);
    }
    .choice:hover {
      border-color: var(--jade);
      background: #e9fff6;
    }
    .stars {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0 16px;
    }
    .star {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: rgba(129, 82, 20, 0.3);
      background: rgba(255, 255, 255, 0.5);
      font-size: 1.35rem;
      font-weight: 950;
    }
    .star.on {
      color: #a86800;
      background: #fff1a8;
      box-shadow: 0 0 20px rgba(246, 184, 61, 0.48);
    }
    .gem-card {
      min-height: 92px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 4px solid #36a8bd;
      border-radius: 8px;
      color: #116c75;
      background: rgba(255, 255, 255, 0.52);
      font-size: 1.28rem;
      font-weight: 950;
      text-align: center;
    }
    .hint-box, .monster {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }
    .monster {
      color: #fff8df;
      background: linear-gradient(135deg, #65458b, #d95c57);
    }
    .boss-view {
      display: none;
      padding: 16px 18px 18px;
    }
    .boss-view.show { display: block; }
    .boss-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .boss-card {
      position: relative;
      overflow: hidden;
      min-height: 150px;
      border: 3px solid rgba(112, 70, 24, 0.22);
      border-radius: 8px;
      background: #fff7dc;
      cursor: pointer;
      aspect-ratio: 16 / 10;
    }
    .boss-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .boss-card.active {
      border-color: var(--jade);
      box-shadow: 0 0 0 5px rgba(28, 155, 131, 0.18);
    }
    .boss-card.done::after {
      content: "配對成功";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff8df;
      background: rgba(28, 155, 131, 0.72);
      font-size: 1.45rem;
      font-weight: 950;
    }
    .boss-tools {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .boss-choice {
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff7c4, var(--gold));
      cursor: pointer;
      font-weight: 950;
    }
    .sparkle {
      position: fixed;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 240, 168, 0.9), transparent 5rem),
        radial-gradient(circle at 72% 30%, rgba(255, 255, 255, 0.84), transparent 6rem),
        radial-gradient(circle at 50% 72%, rgba(246, 184, 61, 0.72), transparent 7rem);
    }
    .sparkle.show { animation: glow 1.1s ease forwards; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(22, 38, 50, 0.72);
    }
    .modal.show { display: grid; }
    .complete-card {
      width: min(660px, 100%);
      padding: clamp(20px, 4vw, 34px);
      border: 4px solid rgba(246, 184, 61, 0.8);
      border-radius: 8px;
      text-align: center;
      background: var(--paper);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
    }
    .medal {
      width: min(220px, 64vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border: 8px solid #36a8bd;
      border-radius: 50%;
      color: #116c75;
      background: #e9fffb;
      font-size: clamp(1.5rem, 5vw, 2.35rem);
      font-weight: 950;
      line-height: 1.18;
      box-shadow: 0 0 28px rgba(91, 218, 232, 0.54);
    }
    @keyframes glow {
      0% { opacity: 0; transform: scale(0.98); }
      28% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.04); }
    }
    @media (max-width: 1120px) {
      .world { grid-template-columns: 1fr; }
      .side { order: 2; }
      .game-panel { order: 1; }
      .level-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr; }
      .status { justify-content: start; }
      .choices, .boss-grid, .boss-tools { grid-template-columns: 1fr; }
      .level-list { grid-template-columns: 1fr; }
      .stars { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>詩境尋寶大冒險</h1>
        <p class="subtitle">觀察唐詩畫卷，選出最像的詩名。</p>
      </div>
      <div class="status">
        <span class="pill" id="levelPill">第 1 / 6 題</span>
        <span class="pill" id="gemPill">詩意寶石 ×0</span>
        <span class="pill" id="timerPill">BOSS 30</span>
        <a class="btn secondary" href="../index.html" style="text-decoration:none;">← 回到大地圖</a>
        <button class="btn secondary" id="voiceBtn" type="button" aria-pressed="false">開啟語音</button>
        <button class="btn secondary" id="resetBtn" type="button">重新開始</button>
      </div>
    </header>

    <section class="world">
      <aside class="panel side">
        <div class="story">
          <h2>關卡故事</h2>
          <p>唐詩王國的詩意寶石被藏進畫裡。仔細看月亮、雪景、漁船、高樓與旅人，找出正確的唐詩吧！</p>
        </div>
        <h2 style="margin-top: 14px;">尋寶地圖</h2>
        <div class="level-list" id="levelList"></div>
      </aside>

      <section class="panel game-panel" aria-label="看圖猜詩遊戲">
        <div class="stage-head">
          <div>
            <h2 id="stageTitle">這幅圖最像哪一首詩？</h2>
            <div id="stageSubtitle">觀察畫面線索，再選答案。</div>
          </div>
          <button class="btn secondary" id="hintBtn" type="button">提示</button>
        </div>
        <div class="message" id="message">請觀察圖片，選出正確的唐詩。</div>
        <div class="scene-wrap" id="normalView">
          <div class="scene-image">
            <img id="sceneImg" src="assets/jingyesi.png" alt="">
            <div class="crystal" aria-hidden="true"><span>寶</span></div>
          </div>
        </div>
        <div class="boss-view" id="bossView">
          <div class="scene-image" style="margin-bottom: 12px;">
            <img src="assets/boss.png" alt="詩境守護獸">
          </div>
          <div class="boss-grid" id="bossGrid"></div>
          <div class="boss-tools" id="bossChoices"></div>
        </div>
        <div class="choices" id="choices"></div>
      </section>

      <aside class="panel side">
        <h2>尋寶獎勵</h2>
        <div class="stars" id="stars"></div>
        <div class="gem-card" id="gemCard">詩意寶石<br>0 / 6</div>
        <div class="hint-box">
          <h3>小書童提示</h3>
          <p id="coach">看圖時先找最大的線索：月亮、雪、船、樓、火爐或村子。</p>
        </div>
        <div class="monster">
          <h3>詩境守護獸</h3>
          <p>完成六題後，30 秒配對挑戰就會開啟。</p>
        </div>
      </aside>
    </section>
  </main>

  <div class="sparkle" id="sparkle"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
    <div class="complete-card">
      <div class="medal">詩境<br>寶石</div>
      <h2 id="completeTitle">恭喜完成第三關！</h2>
      <p>你看懂了唐詩畫卷，也通過詩境守護獸的挑戰。</p>
      <button class="btn" id="againBtn" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const stages = [
      {
        title: "靜夜思",
        mapName: "月夜寶境",
        image: "assets/jingyesi.png",
        choices: ["江雪", "靜夜思", "鹿柴", "登鸛鵲樓"],
        answer: "靜夜思",
        hint: "窗邊有明月，地上像鋪著霜。"
      },
      {
        title: "江雪",
        mapName: "雪江寶境",
        image: "assets/jiangxue.png",
        choices: ["江雪", "嫦娥", "問劉十九", "秋夕"],
        answer: "江雪",
        hint: "雪中的江面上，只有一位漁翁和一艘小船。"
      },
      {
        title: "登鸛鵲樓",
        mapName: "高樓寶境",
        image: "assets/dengguanquelou.png",
        choices: ["回鄉偶書", "登鸛鵲樓", "鹿柴", "送友人"],
        answer: "登鸛鵲樓",
        hint: "高樓、夕陽、黃河，代表登高望遠。"
      },
      {
        title: "鹿柴",
        mapName: "深林寶境",
        image: "assets/luchai.png",
        choices: ["鹿柴", "江雪", "春望", "秋夕"],
        answer: "鹿柴",
        hint: "空山不見人，陽光照進深林和青苔。"
      },
      {
        title: "問劉十九",
        mapName: "暖爐寶境",
        image: "assets/wenliushijiu.png",
        choices: ["問劉十九", "靜夜思", "江雪", "嫦娥"],
        answer: "問劉十九",
        hint: "小火爐、綠螘新醅酒，窗外快下雪了。"
      },
      {
        title: "回鄉偶書",
        mapName: "故鄉寶境",
        image: "assets/huixiangoushu.png",
        choices: ["秋夕", "嫦娥", "回鄉偶書", "江雪"],
        answer: "回鄉偶書",
        hint: "老旅人回到家鄉，孩子們好奇地圍著他。"
      }
    ];

    const bossStages = stages.slice(0, 4);
    const els = {
      levelPill: document.getElementById("levelPill"),
      gemPill: document.getElementById("gemPill"),
      timerPill: document.getElementById("timerPill"),
      voiceBtn: document.getElementById("voiceBtn"),
      resetBtn: document.getElementById("resetBtn"),
      levelList: document.getElementById("levelList"),
      stageTitle: document.getElementById("stageTitle"),
      stageSubtitle: document.getElementById("stageSubtitle"),
      hintBtn: document.getElementById("hintBtn"),
      message: document.getElementById("message"),
      normalView: document.getElementById("normalView"),
      bossView: document.getElementById("bossView"),
      sceneImg: document.getElementById("sceneImg"),
      choices: document.getElementById("choices"),
      bossGrid: document.getElementById("bossGrid"),
      bossChoices: document.getElementById("bossChoices"),
      stars: document.getElementById("stars"),
      gemCard: document.getElementById("gemCard"),
      coach: document.getElementById("coach"),
      sparkle: document.getElementById("sparkle"),
      modal: document.getElementById("modal"),
      againBtn: document.getElementById("againBtn")
    };

    const state = {
      current: 0,
      solved: new Set(),
      bossMode: false,
      bossActive: 0,
      bossSolved: new Set(),
      bossTime: 30,
      bossTimer: 0,
      audioCtx: null,
      voiceOn: false,
      voice: null
    };

    function init() {
      renderMap();
      renderRewards();
      renderStage();
      bindControls();
    }

    function renderMap() {
      els.levelList.innerHTML = stages.map((stage, index) => `
        <button class="level-btn ${index === state.current && !state.bossMode ? "active" : ""} ${state.solved.has(index) ? "done" : ""}" data-level="${index}" type="button">
          <span>第${index + 1}題</span>
          <span class="level-name">${stage.mapName}</span>
          <span>${state.solved.has(index) ? "◆" : "◇"}</span>
        </button>
      `).join("") + `
        <button class="level-btn ${state.bossMode ? "active" : ""}" id="bossBtn" type="button">
          <span>BOSS</span><span class="level-name">詩境守護獸</span><span>${state.solved.size === stages.length ? "◆" : "◇"}</span>
        </button>
      `;
      document.querySelectorAll("[data-level]").forEach(button => {
        button.addEventListener("click", () => {
          state.bossMode = false;
          state.current = Number(button.dataset.level);
          renderStage();
          renderMap();
          speakCurrent();
        });
      });
      document.getElementById("bossBtn").addEventListener("click", () => {
        if (state.solved.size < stages.length) {
          showMessage("先完成六題，詩境守護獸才會出現。", "hint");
          return;
        }
        startBoss();
      });
    }

    function renderRewards() {
      els.stars.innerHTML = stages.map((_, index) => `<div class="star ${state.solved.has(index) ? "on" : ""}">◆</div>`).join("");
      els.gemPill.textContent = `詩意寶石 ×${state.solved.size}`;
      els.gemCard.innerHTML = `詩意寶石<br>${state.solved.size} / ${stages.length}`;
      els.timerPill.style.display = state.bossMode ? "inline-grid" : "none";
      els.timerPill.textContent = `BOSS ${state.bossTime}`;
    }

    function renderStage() {
      const stage = stages[state.current];
      stopBossTimer();
      state.bossMode = false;
      els.normalView.style.display = "block";
      els.bossView.classList.remove("show");
      els.choices.style.display = "grid";
      els.levelPill.textContent = `第 ${state.current + 1} / ${stages.length} 題`;
      els.stageTitle.textContent = "這幅圖最像哪一首詩？";
      els.stageSubtitle.textContent = `第 ${state.current + 1} 張詩境畫卷`;
      els.sceneImg.src = stage.image;
      els.sceneImg.alt = stage.title;
      showMessage("請觀察圖片，選出正確的唐詩。", "");
      els.coach.textContent = "看圖時先找最大的線索：月亮、雪、船、樓、火爐或村子。";
      els.choices.innerHTML = stage.choices.map((choice, index) => `
        <button class="choice" data-choice="${choice}" type="button">${String.fromCharCode(65 + index)}. ${choice}</button>
      `).join("");
      els.choices.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => chooseAnswer(button.dataset.choice));
      });
      renderRewards();
    }

    function chooseAnswer(choice) {
      const stage = stages[state.current];
      if (choice !== stage.answer) {
        showMessage(`小提示：${stage.hint}`, "hint");
        els.coach.textContent = "再看一次畫面線索，答案就在風景裡。";
        speak(`小提示：${stage.hint}`);
        return;
      }
      state.solved.add(state.current);
      playBell();
      showGlow();
      showMessage(`答對了！這幅圖是〈${stage.answer}〉，獲得詩意寶石。`, "win");
      els.coach.textContent = "小書童跳起來：你真的看懂詩裡的風景了！";
      speak(`答對了！這幅圖是${stage.answer}，獲得詩意寶石。`);
      renderRewards();
      renderMap();
      window.setTimeout(() => {
        if (state.solved.size === stages.length) {
          startBoss();
          return;
        }
        const next = stages.findIndex((_, index) => !state.solved.has(index));
        state.current = next >= 0 ? next : state.current;
        renderStage();
        renderMap();
      }, 1300);
    }

    function startBoss() {
      state.bossMode = true;
      state.bossActive = 0;
      state.bossSolved = new Set();
      state.bossTime = 30;
      els.normalView.style.display = "none";
      els.bossView.classList.add("show");
      els.choices.style.display = "none";
      els.levelPill.textContent = "BOSS 關";
      els.stageTitle.textContent = "詩境守護獸";
      els.stageSubtitle.textContent = "30 秒內完成 4 張圖配對";
      showMessage("點一張圖片，再選它對應的詩名。", "hint");
      renderBoss();
      renderRewards();
      renderMap();
      speak("詩境守護獸出現了。請在三十秒內完成四張圖片配對。", true);
      stopBossTimer();
      state.bossTimer = window.setInterval(() => {
        state.bossTime -= 1;
        els.timerPill.textContent = `BOSS ${state.bossTime}`;
        if (state.bossTime <= 0) {
          stopBossTimer();
          showMessage("時間到，別擔心，再挑戰一次。", "hint");
          window.setTimeout(startBoss, 1200);
        }
      }, 1000);
    }

    function renderBoss() {
      els.bossGrid.innerHTML = bossStages.map((stage, index) => `
        <button class="boss-card ${state.bossActive === index ? "active" : ""} ${state.bossSolved.has(index) ? "done" : ""}" data-boss="${index}" type="button">
          <img src="${stage.image}" alt="BOSS配對圖片${index + 1}">
        </button>
      `).join("");
      els.bossChoices.innerHTML = bossStages.map(stage => `
        <button class="boss-choice" data-boss-choice="${stage.answer}" type="button">${stage.answer}</button>
      `).join("");
      document.querySelectorAll("[data-boss]").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.boss);
          if (!state.bossSolved.has(index)) state.bossActive = index;
          renderBoss();
        });
      });
      document.querySelectorAll("[data-boss-choice]").forEach(button => {
        button.addEventListener("click", () => chooseBoss(button.dataset.bossChoice));
      });
    }

    function chooseBoss(choice) {
      const target = bossStages[state.bossActive];
      if (choice !== target.answer) {
        showMessage(`這張圖不是〈${choice}〉，再看看畫面線索。`, "hint");
        speak("再看看畫面線索，換一個答案試試。");
        return;
      }
      state.bossSolved.add(state.bossActive);
      playBell();
      showGlow();
      showMessage(`配對成功：〈${target.answer}〉`, "win");
      const next = bossStages.findIndex((_, index) => !state.bossSolved.has(index));
      state.bossActive = next >= 0 ? next : state.bossActive;
      renderBoss();
      if (state.bossSolved.size === bossStages.length) {
        stopBossTimer();
        window.setTimeout(() => {
          localStorage.setItem("cert_warrior", "true");
          els.modal.classList.add("show");
          speak("恭喜通過詩境守護獸挑戰，獲得詩境寶石。", true);
        }, 800);
      }
    }

    function showMessage(text, type) {
      els.message.textContent = text;
      els.message.className = `message ${type}`.trim();
    }

    function showHint() {
      const text = state.bossMode ? "BOSS關：先點圖片，再選詩名。月亮是靜夜思，雪江小船是江雪，高樓黃河是登鸛鵲樓，深林青苔是鹿柴。" : stages[state.current].hint;
      showMessage(`小提示：${text}`, "hint");
      speak(`小提示：${text}`);
    }

    function showGlow() {
      els.sparkle.classList.remove("show");
      void els.sparkle.offsetWidth;
      els.sparkle.classList.add("show");
    }

    function playBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!state.audioCtx) state.audioCtx = new AudioContext();
      const ctx = state.audioCtx;
      const now = ctx.currentTime;
      [220, 293.66, 440].forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.001, now + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.2 / (index + 1), now + 0.09 + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.9 + index * 0.16);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.045);
        osc.stop(now + 2.1 + index * 0.16);
      });
    }

    function toggleVoice() {
      state.voiceOn = !state.voiceOn;
      els.voiceBtn.textContent = state.voiceOn ? "關閉語音" : "開啟語音";
      els.voiceBtn.setAttribute("aria-pressed", String(state.voiceOn));
      if (state.voiceOn) {
        pickVoice();
        speakCurrent(true);
      } else {
        stopVoice();
      }
    }

    function pickVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const zhVoices = voices.filter(voice => /zh|Chinese|Taiwan|Mandarin/i.test(`${voice.lang} ${voice.name}`));
      state.voice = zhVoices.find(voice => /Taiwan|zh-TW|Mei-Jia|Hanhan/i.test(`${voice.lang} ${voice.name}`))
        || zhVoices[0]
        || voices[0]
        || null;
      return state.voice;
    }

    function speakCurrent(force = false) {
      if (state.bossMode) {
        speak("BOSS關，請點一張圖片，再選它對應的詩名。", force);
        return;
      }
      speak(`第 ${state.current + 1} 題，這幅圖最像哪一首詩？`, force);
    }

    function speak(text, force = false) {
      if (!("speechSynthesis" in window)) return;
      if (!state.voiceOn) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-TW";
      utterance.rate = 0.84;
      utterance.pitch = 1.08;
      utterance.volume = 1;
      utterance.voice = state.voice || pickVoice();
      window.speechSynthesis.speak(utterance);
    }

    function stopVoice() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function stopBossTimer() {
      window.clearInterval(state.bossTimer);
      state.bossTimer = 0;
    }

    function resetGame() {
      stopBossTimer();
      state.current = 0;
      state.solved = new Set();
      state.bossMode = false;
      state.bossSolved = new Set();
      state.bossTime = 30;
      els.modal.classList.remove("show");
      renderMap();
      renderRewards();
      renderStage();
      speakCurrent();
    }

    function bindControls() {
      els.hintBtn.addEventListener("click", showHint);
      els.voiceBtn.addEventListener("click", toggleVoice);
      els.resetBtn.addEventListener("click", resetGame);
      els.againBtn.addEventListener("click", resetGame);
      if ("speechSynthesis" in window) {
        pickVoice();
        window.speechSynthesis.addEventListener("voiceschanged", pickVoice);
      } else {
        els.voiceBtn.disabled = true;
        els.voiceBtn.textContent = "不支援語音";
      }
    }

    init();
  </script>
</body>
</html>
