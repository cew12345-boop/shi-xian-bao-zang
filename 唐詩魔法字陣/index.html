<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐詩魔法字陣</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #3a2412;
      --paper: #fff7d9;
      --gold: #f7b733;
      --jade: #1d9b82;
      --red: #d95546;
      --wood: #a96b32;
      --night: #183a4c;
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: #f6d98d;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: url("assets/academy-bg.png") center / cover no-repeat;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(255, 244, 200, 0.72), rgba(255, 244, 200, 0.25) 34%, rgba(255, 244, 200, 0.68)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 230, 158, 0.38));
      pointer-events: none;
    }
    button { color: inherit; font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px clamp(12px, 2.5vw, 28px);
      color: #fff8df;
      background: rgba(24, 58, 76, 0.9);
      box-shadow: 0 10px 24px rgba(28, 22, 10, 0.2);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: rgba(255, 248, 223, 0.86);
      font-weight: 900;
      line-height: 1.45;
    }
    .status {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: end;
      flex-wrap: wrap;
    }
    .pill,
    .btn {
      min-height: 44px;
      display: inline-grid;
      place-items: center;
      padding: 9px 14px;
      border-radius: 8px;
      font-weight: 950;
      white-space: nowrap;
    }
    .pill {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.14);
    }
    .btn {
      border: 0;
      cursor: pointer;
      background: #fff2a8;
      box-shadow: 0 8px 15px rgba(49, 31, 10, 0.16);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn.secondary {
      color: #fff8df;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: none;
    }
    .game {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 24px);
      display: grid;
      grid-template-columns: minmax(250px, 330px) minmax(0, 1fr) minmax(250px, 330px);
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      border: 2px solid rgba(110, 67, 22, 0.22);
      border-radius: 8px;
      background: rgba(255, 247, 217, 0.91);
      box-shadow: 0 18px 44px rgba(46, 28, 8, 0.18);
    }
    .side { padding: 16px; }
    .side h2,
    .side h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      line-height: 1.25;
    }
    .character-card {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      color: #fff8df;
      background: linear-gradient(145deg, #216d77, #1d9b82);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .chibi {
      width: 74px;
      height: 74px;
      position: relative;
      border-radius: 50%;
      background: #ffe1ad;
      border: 4px solid #57331b;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
    }
    .chibi::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: -11px;
      height: 24px;
      border-radius: 50% 50% 8px 8px;
      background: #243e75;
      border: 3px solid #ffe88f;
    }
    .chibi::after {
      content: "⌣";
      position: absolute;
      inset: 18px 0 auto;
      text-align: center;
      color: #57331b;
      font-size: 2.3rem;
      font-weight: 950;
    }
    .character-card p,
    .story p {
      margin: 0;
      font-weight: 900;
      line-height: 1.6;
    }
    .story {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }
    .level-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .level-btn {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border: 2px solid rgba(101, 65, 22, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.52);
      cursor: pointer;
      text-align: left;
      font-weight: 950;
    }
    .level-btn.active {
      border-color: rgba(29, 155, 130, 0.84);
      background: #e9fff6;
      box-shadow: 0 0 0 4px rgba(29, 155, 130, 0.15);
    }
    .level-btn.done {
      border-color: rgba(247, 183, 51, 0.85);
      background: #fff1af;
    }
    .level-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .board-panel {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }
    .quest {
      padding: 16px 18px 10px;
      background:
        radial-gradient(circle at 85% 0%, rgba(247, 183, 51, 0.34), transparent 9rem),
        linear-gradient(135deg, rgba(255, 255, 255, 0.48), rgba(255, 243, 191, 0.76));
    }
    .quest h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      line-height: 1.12;
    }
    .author {
      margin-top: 4px;
      color: rgba(58, 36, 18, 0.7);
      font-weight: 950;
    }
    .message {
      min-height: 54px;
      display: flex;
      align-items: center;
      margin: 12px 18px 0;
      padding: 10px 14px;
      border-radius: 8px;
      background: #e9ffce;
      border: 2px solid rgba(86, 155, 73, 0.25);
      font-size: clamp(1rem, 2vw, 1.22rem);
      font-weight: 950;
      line-height: 1.45;
    }
    .message.hint {
      color: #7a4619;
      background: #fff0c7;
      border-color: rgba(247, 183, 51, 0.52);
    }
    .message.win {
      color: #744700;
      background: #fff2a8;
      border-color: rgba(247, 183, 51, 0.84);
      box-shadow: 0 0 26px rgba(247, 183, 51, 0.42);
    }
    .play-zone {
      display: grid;
      grid-template-columns: minmax(245px, 0.76fr) minmax(320px, 1fr);
      gap: 14px;
      padding: 16px 18px 18px;
    }
    .poem-card,
    .matrix-wrap {
      padding: 12px;
      border-radius: 8px;
      border: 2px solid rgba(112, 70, 24, 0.18);
      background: rgba(255, 255, 255, 0.42);
    }
    .poem-lines {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .poem-line {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fffefa, #f6dfaa);
      border: 2px solid rgba(112, 70, 24, 0.18);
      font-size: clamp(1.28rem, 2.6vw, 1.8rem);
      font-weight: 950;
      text-align: center;
    }
    .blank {
      min-width: 1.8em;
      min-height: 1.8em;
      display: inline-grid;
      place-items: center;
      margin: 0 2px;
      border: 3px solid #e0a22e;
      border-radius: 8px;
      color: #8b5100;
      background: #fff1a8;
      box-shadow: 0 0 18px rgba(247, 183, 51, 0.62);
      cursor: pointer;
      vertical-align: middle;
    }
    .blank.selected {
      border-color: var(--jade);
      background: #dfffee;
      box-shadow: 0 0 0 5px rgba(29, 155, 130, 0.2), 0 0 20px rgba(29, 155, 130, 0.45);
    }
    .blank.filled {
      border-color: #c83f35;
      color: #b6342f;
      background: #fff8dd;
      box-shadow: none;
      cursor: default;
    }
    .matrix {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 4px;
      aspect-ratio: 1;
    }
    .tile {
      display: grid;
      place-items: center;
      border: 1px solid rgba(65, 35, 12, 0.22);
      border-radius: 5px;
      background: linear-gradient(145deg, #d99349, #9d612b);
      color: #fff8df;
      font-size: clamp(0.8rem, 1.6vw, 1.28rem);
      font-weight: 950;
      text-shadow: 0 1px 2px rgba(50, 24, 8, 0.32);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.25);
    }
    .tile.blank-tile {
      border: 3px solid #ffd65f;
      color: #8b5100;
      background: radial-gradient(circle, #fff8bc, #f7b733);
      box-shadow: 0 0 18px rgba(247, 183, 51, 0.75);
      cursor: pointer;
    }
    .tile.blank-tile.selected {
      border-color: var(--jade);
      background: #dfffee;
      box-shadow: 0 0 0 4px rgba(29, 155, 130, 0.18), 0 0 18px rgba(29, 155, 130, 0.45);
    }
    .tile.blank-tile.filled {
      border-color: #ffd65f;
      background: linear-gradient(145deg, #fff5b4, #f7b733);
      cursor: default;
    }
    .tile.pick-tile {
      border: 3px solid rgba(255, 246, 170, 0.95);
      color: #4a250a;
      background: linear-gradient(145deg, #fff7c4, #f7b733);
      cursor: pointer;
      box-shadow: 0 0 14px rgba(247, 183, 51, 0.48), inset 0 1px rgba(255, 255, 255, 0.42);
      text-shadow: none;
    }
    .tile.pick-tile:hover,
    .tile.pick-tile:focus-visible {
      outline: none;
      transform: translateY(-1px);
      box-shadow: 0 0 0 4px rgba(29, 155, 130, 0.18), 0 0 18px rgba(29, 155, 130, 0.42);
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 18px 18px;
    }
    .choice {
      min-height: 70px;
      border: 0;
      border-radius: 8px;
      color: #44240d;
      background: linear-gradient(180deg, #fff7c4, #f7b733);
      box-shadow: 0 10px 18px rgba(69, 39, 9, 0.18);
      cursor: pointer;
      font-size: clamp(1.5rem, 3.8vw, 2.7rem);
      font-weight: 950;
    }
    .choice.used {
      opacity: 0.45;
      filter: grayscale(0.3);
    }
    .reward-stars {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0 14px;
    }
    .big-star {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: rgba(129, 82, 20, 0.3);
      background: rgba(255, 255, 255, 0.5);
      font-size: 1.6rem;
      font-weight: 950;
    }
    .big-star.on {
      color: #a86800;
      background: #fff1a8;
      box-shadow: 0 0 20px rgba(247, 183, 51, 0.48);
    }
    .stamp {
      min-height: 94px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 4px solid #c83f35;
      border-radius: 8px;
      color: #b6342f;
      background: rgba(255, 255, 255, 0.52);
      font-size: 1.35rem;
      font-weight: 950;
      text-align: center;
    }
    .monster {
      margin-top: 12px;
      min-height: 94px;
      display: grid;
      grid-template-columns: 66px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      color: #fff8df;
      background: linear-gradient(135deg, #65458b, #d95546);
    }
    .monster-face {
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #2e1e45;
      font-size: 2rem;
      font-weight: 950;
    }
    .sparkle {
      position: fixed;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 20% 22%, rgba(255, 244, 150, 0.9), transparent 5rem),
        radial-gradient(circle at 72% 35%, rgba(255, 255, 255, 0.84), transparent 6rem),
        radial-gradient(circle at 52% 70%, rgba(247, 183, 51, 0.72), transparent 8rem);
    }
    .sparkle.show { animation: glow 1.1s ease forwards; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(24, 40, 50, 0.72);
    }
    .modal.show { display: grid; }
    .complete-card {
      width: min(650px, 100%);
      padding: clamp(20px, 4vw, 34px);
      border: 4px solid rgba(247, 183, 51, 0.8);
      border-radius: 8px;
      text-align: center;
      background: var(--paper);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
    }
    .medal {
      width: min(220px, 64vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border: 8px solid #c83f35;
      border-radius: 50%;
      color: #b6342f;
      background: #fff2a8;
      font-size: clamp(1.5rem, 5vw, 2.35rem);
      font-weight: 950;
      line-height: 1.18;
    }
    @keyframes glow {
      0% { opacity: 0; transform: scale(0.98); }
      28% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.04); }
    }
    @keyframes restore {
      0% { transform: scale(0.98); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.18); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .restoring { animation: restore 0.75s ease; }
    @media (max-width: 1120px) {
      .game { grid-template-columns: 1fr; }
      .side { order: 2; }
      .board-panel { order: 1; }
      .level-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr; }
      .status { justify-content: start; }
      .play-zone { grid-template-columns: 1fr; }
      .choices { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .level-list { grid-template-columns: 1fr; }
      .matrix { gap: 3px; }
      .tile { border-radius: 4px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>唐詩魔法字陣</h1>
        <p class="subtitle">閱讀唐詩，點亮金色空格，選出缺少的字。</p>
      </div>
      <div class="status">
        <span class="pill" id="levelPill">第 1 / 4 題</span>
        <span class="pill" id="starPill">詩星 ×0</span>
        <a class="btn secondary" href="../index.html" style="text-decoration:none;">← 回到大地圖</a>
        <button class="btn secondary" id="voiceBtn" type="button" aria-pressed="false">開啟語音</button>
        <button class="btn secondary" id="resetBtn" type="button">重新開始</button>
      </div>
    </header>

    <section class="game">
      <aside class="panel side">
        <div class="character-card">
          <div class="chibi" aria-hidden="true"></div>
          <p>李白先生說：先選金色空格，再選下面的字。慢慢讀，一定可以修復詩卷！</p>
        </div>
        <div class="story">
          <h2>關卡任務</h2>
          <p>墨妖怪把唐詩中的字偷走了。請用魔法字陣找回正確的字，完成 4 首詩。</p>
        </div>
        <h2 style="margin-top: 14px;">詩卷地圖</h2>
        <div class="level-list" id="levelList"></div>
      </aside>

      <section class="panel board-panel" aria-label="唐詩魔法字陣遊戲">
        <div class="quest">
          <h2 id="poemTitle">〈靜夜思〉</h2>
          <div class="author" id="poemAuthor">李白</div>
        </div>
        <div class="message" id="message">先點詩句或字陣中的金色空格，再選一個候選字。</div>
        <div class="play-zone">
          <div class="poem-card">
            <h3>缺字詩卷</h3>
            <div class="poem-lines" id="poemLines"></div>
          </div>
          <div class="matrix-wrap">
            <h3>10×10 魔法字陣</h3>
            <div class="matrix" id="matrix"></div>
          </div>
        </div>
        <div class="choices" id="choices"></div>
      </section>

      <aside class="panel side">
        <h2>冒險獎勵</h2>
        <div class="reward-stars" id="rewardStars"></div>
        <div class="stamp" id="stamp">詩卷修復<br>0 / 4</div>
        <div class="monster">
          <div class="monster-face" aria-hidden="true">墨</div>
          <p id="coach">答錯也不扣分，墨妖怪最怕你再試一次。</p>
        </div>
      </aside>
    </section>
  </main>

  <div class="sparkle" id="sparkle"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
    <div class="complete-card">
      <div class="medal">字陣<br>小法師</div>
      <h2 id="completeTitle">恭喜完成唐詩魔法字陣！</h2>
      <p>你修復了 4 首唐詩，閱讀力、識字力和冒險精神都升級了。</p>
      <button class="btn" id="againBtn" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const baseGrid = [
      ["山", "花", "光", "林", "水", "月", "竹", "風", "星", "雲"],
      ["雨", "魚", "鳥", "草", "光", "月", "石", "木", "田", "天"],
      ["白", "日", "光", "山", "河", "海", "流", "風", "林", "水"],
      ["霜", "花", "草", "木", "月", "星", "雲", "鳥", "雨", "山"],
      ["江", "河", "湖", "海", "光", "月", "風", "雨", "林", "石"],
      ["春", "夏", "秋", "冬", "鄉", "光", "月", "山", "水", "雲"],
      ["竹", "林", "深", "處", "月", "光", "魚", "鳥", "花", "草"],
      ["松", "柏", "青", "青", "霜", "花", "石", "木", "水", "天"],
      ["故", "鄉", "風", "月", "光", "山", "河", "林", "雨", "雲"],
      ["李", "白", "詩", "卷", "月", "光", "竹", "林", "花", "草"]
    ];

    const puzzles = [
      {
        title: "靜夜思",
        author: "李白",
        lines: ["床前明月□", "疑是地上□", "舉頭望明□", "低頭思故□"],
        choices: ["光", "月", "鄉", "霜"],
        answers: ["光", "霜", "月", "鄉"],
        hint: "先想月亮照在床前，所以第一個缺字是光。",
        blanks: [[0, 2], [3, 0], [0, 5], [5, 4]]
      },
      {
        title: "登鸛鵲樓",
        author: "王之渙",
        lines: ["白日依山□", "黃河入海□", "欲窮千里□", "更上一層□"],
        choices: ["目", "樓", "流", "盡"],
        answers: ["盡", "流", "目", "樓"],
        hint: "前兩句是風景：太陽落山，黃河流入海。",
        blanks: [[2, 1], [2, 6], [3, 5], [9, 3]]
      },
      {
        title: "江雪",
        author: "柳宗元",
        lines: ["千山鳥飛□", "萬徑人蹤□", "孤舟蓑笠□", "獨釣寒江□"],
        choices: ["翁", "絕", "雪", "滅"],
        answers: ["絕", "滅", "翁", "雪"],
        hint: "先是鳥飛絕、人蹤滅，最後是寒江雪。",
        blanks: [[0, 8], [1, 0], [8, 1], [7, 4]]
      },
      {
        title: "鹿柴",
        author: "王維",
        lines: ["空山不見□", "但聞人語□", "返景入深□", "復照青苔□"],
        choices: ["人", "林", "響", "上"],
        answers: ["人", "響", "林", "上"],
        hint: "先是不見人，只聽見人語響，光再照進深林。",
        blanks: [[2, 3], [0, 7], [6, 1], [1, 9]]
      }
    ];

    const els = {
      levelPill: document.getElementById("levelPill"),
      starPill: document.getElementById("starPill"),
      voiceBtn: document.getElementById("voiceBtn"),
      resetBtn: document.getElementById("resetBtn"),
      levelList: document.getElementById("levelList"),
      poemTitle: document.getElementById("poemTitle"),
      poemAuthor: document.getElementById("poemAuthor"),
      message: document.getElementById("message"),
      poemLines: document.getElementById("poemLines"),
      matrix: document.getElementById("matrix"),
      choices: document.getElementById("choices"),
      rewardStars: document.getElementById("rewardStars"),
      stamp: document.getElementById("stamp"),
      coach: document.getElementById("coach"),
      sparkle: document.getElementById("sparkle"),
      modal: document.getElementById("modal"),
      againBtn: document.getElementById("againBtn")
    };

    const state = {
      current: 0,
      selected: 0,
      filled: [null, null, null, null],
      solved: new Set(),
      audioCtx: null,
      voiceOn: false,
      voice: null
    };

    function init() {
      renderLevelList();
      renderRewards();
      renderPuzzle();
      bindControls();
    }

    function renderLevelList() {
      els.levelList.innerHTML = puzzles.map((puzzle, index) => `
        <button class="level-btn ${index === state.current ? "active" : ""} ${state.solved.has(index) ? "done" : ""}" data-level="${index}" type="button">
          <span>第${index + 1}題</span>
          <span class="level-name">〈${puzzle.title}〉</span>
          <span>${state.solved.has(index) ? "★" : "☆"}</span>
        </button>
      `).join("");
      document.querySelectorAll("[data-level]").forEach(button => {
        button.addEventListener("click", () => {
          loadPuzzle(Number(button.dataset.level));
          speakCurrentPuzzle();
        });
      });
    }

    function renderRewards() {
      els.rewardStars.innerHTML = puzzles.map((_, index) => `
        <div class="big-star ${state.solved.has(index) ? "on" : ""}">★</div>
      `).join("");
      els.starPill.textContent = `詩星 ×${state.solved.size}`;
      els.stamp.innerHTML = `詩卷修復<br>${state.solved.size} / ${puzzles.length}`;
    }

    function renderPuzzle() {
      const puzzle = puzzles[state.current];
      els.levelPill.textContent = `第 ${state.current + 1} / ${puzzles.length} 題`;
      els.poemTitle.textContent = `〈${puzzle.title}〉`;
      els.poemAuthor.textContent = puzzle.author;
      els.message.textContent = "先點詩句或字陣中的金色空格，再選一個候選字。";
      els.message.className = "message";
      els.coach.textContent = "答錯也不扣分，墨妖怪最怕你再試一次。";
      renderPoemLines();
      renderMatrix();
      renderChoices();
    }

    function renderPoemLines() {
      const puzzle = puzzles[state.current];
      els.poemLines.innerHTML = puzzle.lines.map((line, index) => {
        const value = state.filled[index] || "";
        const parts = line.split("□");
        return `
          <div class="poem-line">
            ${parts[0]}<button class="blank ${state.selected === index ? "selected" : ""} ${value ? "filled" : ""}" data-blank="${index}" type="button">${value || "□"}</button>${parts[1] || ""}
          </div>
        `;
      }).join("");
      bindBlankButtons();
    }

    function renderMatrix() {
      const puzzle = puzzles[state.current];
      const grid = baseGrid.map(row => row.slice());
      placeChoicesInGrid(grid, puzzle);
      puzzle.blanks.forEach(([row, col], index) => {
        grid[row][col] = state.filled[index] || "□";
      });
      els.matrix.innerHTML = grid.map((row, rowIndex) => row.map((char, colIndex) => {
        const blankIndex = puzzle.blanks.findIndex(([r, c]) => r === rowIndex && c === colIndex);
        const isBlank = blankIndex >= 0;
        const canPick = !isBlank && puzzle.choices.includes(char);
        const classes = [
          "tile",
          isBlank ? "blank-tile" : "",
          canPick ? "pick-tile" : "",
          isBlank && state.selected === blankIndex ? "selected" : "",
          isBlank && state.filled[blankIndex] ? "filled" : ""
        ].filter(Boolean).join(" ");
        const attrs = isBlank
          ? `data-blank="${blankIndex}" role="button" tabindex="0" aria-label="選擇第 ${blankIndex + 1} 個空格"`
          : canPick
            ? `data-choice="${char}" role="button" tabindex="0" aria-label="選擇字 ${char}"`
            : "";
        return `<div class="${classes}" ${attrs}>${char}</div>`;
      }).join("")).join("");
      bindMatrixTiles();
    }

    function placeChoicesInGrid(grid, puzzle) {
      const blankKeys = new Set(puzzle.blanks.map(([row, col]) => `${row}-${col}`));
      const scatteredCells = [
        [[1, 7], [3, 2], [6, 8], [8, 4], [2, 5], [7, 1]],
        [[0, 6], [3, 8], [5, 2], [8, 7], [6, 4], [1, 1]],
        [[1, 4], [4, 9], [6, 2], [9, 6], [2, 0], [7, 7]],
        [[0, 8], [2, 2], [5, 7], [8, 3], [4, 1], [9, 8]]
      ];
      const preferredCells = scatteredCells[state.current] || scatteredCells[0];
      const safeCells = preferredCells.filter(([row, col]) => !blankKeys.has(`${row}-${col}`));
      puzzle.choices.forEach((char, index) => {
        const cell = safeCells[index];
        if (!cell) return;
        grid[cell[0]][cell[1]] = char;
      });
    }

    function renderChoices() {
      const puzzle = puzzles[state.current];
      els.choices.innerHTML = puzzle.choices.map((char, index) => {
        const used = state.filled.includes(char);
        return `<button class="choice ${used ? "used" : ""}" data-choice="${char}" type="button"><small>${String.fromCharCode(65 + index)}</small> ${char}</button>`;
      }).join("");
      els.choices.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => chooseCharacter(button.dataset.choice));
      });
    }

    function bindBlankButtons() {
      document.querySelectorAll(".blank").forEach(button => {
        button.addEventListener("click", () => selectBlank(Number(button.dataset.blank)));
      });
    }

    function bindMatrixTiles() {
      document.querySelectorAll(".blank-tile").forEach(tile => {
        tile.addEventListener("click", () => selectBlank(Number(tile.dataset.blank)));
        tile.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectBlank(Number(tile.dataset.blank));
          }
        });
      });
      document.querySelectorAll(".pick-tile").forEach(tile => {
        tile.addEventListener("click", () => chooseCharacter(tile.dataset.choice));
        tile.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            chooseCharacter(tile.dataset.choice);
          }
        });
      });
    }

    function selectBlank(index) {
      state.selected = index;
      renderPoemLines();
      renderMatrix();
      const line = puzzles[state.current].lines[index].replace("□", "空格");
      setMessage(`請選第 ${index + 1} 個空格的字。`, "");
      speak(line);
    }

    function chooseCharacter(char) {
      const puzzle = puzzles[state.current];
      const index = state.selected;
      if (state.filled[index]) {
        const next = state.filled.findIndex(value => !value);
        if (next >= 0) state.selected = next;
      }
      const target = puzzle.answers[state.selected];
      if (char !== target) {
        setMessage(`小提示：${puzzle.hint}`, "hint");
        els.coach.textContent = "很接近了！換一個字試試看。";
        speak(`小提示：${puzzle.hint}`);
        return;
      }
      state.filled[state.selected] = char;
      playBell();
      showGlow();
      setMessage(`答對了！「${char}」回到詩卷裡了。`, "win");
      els.coach.textContent = "李白先生點點頭：這個字找得真準！";
      advanceSelection();
      renderPoemLines();
      renderMatrix();
      renderChoices();
      checkPuzzleComplete();
    }

    function advanceSelection() {
      const next = state.filled.findIndex(value => !value);
      if (next >= 0) state.selected = next;
    }

    function checkPuzzleComplete() {
      if (state.filled.some(value => !value)) return;
      state.solved.add(state.current);
      renderRewards();
      renderLevelList();
      document.querySelector(".board-panel").classList.add("restoring");
      window.setTimeout(() => document.querySelector(".board-panel").classList.remove("restoring"), 780);
      speak(`詩卷修復成功！獲得一顆詩星。`);
      window.setTimeout(() => {
        if (state.solved.size === puzzles.length) {
          localStorage.setItem("cert_idiom", "true");
          els.modal.classList.add("show");
          speak("恭喜完成唐詩魔法字陣！你獲得字陣小法師徽章。");
          return;
        }
        const next = puzzles.findIndex((_, index) => !state.solved.has(index));
        loadPuzzle(next >= 0 ? next : state.current);
      }, 1250);
    }

    function loadPuzzle(index) {
      state.current = index;
      state.selected = 0;
      state.filled = [null, null, null, null];
      renderPuzzle();
      renderLevelList();
    }

    function setMessage(text, type) {
      els.message.textContent = text;
      els.message.className = `message ${type}`.trim();
    }

    function showGlow() {
      els.sparkle.classList.remove("show");
      void els.sparkle.offsetWidth;
      els.sparkle.classList.add("show");
    }

    function playBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!state.audioCtx) state.audioCtx = new AudioContext();
      const ctx = state.audioCtx;
      const now = ctx.currentTime;
      [220, 277.18, 440].forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.001, now + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.19 / (index + 1), now + 0.09 + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8 + index * 0.16);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.045);
        osc.stop(now + 2 + index * 0.16);
      });
    }

    function toggleVoice() {
      state.voiceOn = !state.voiceOn;
      els.voiceBtn.textContent = state.voiceOn ? "關閉語音" : "開啟語音";
      els.voiceBtn.setAttribute("aria-pressed", String(state.voiceOn));
      if (state.voiceOn) {
        pickVoice();
        speakCurrentPuzzle(true);
      } else {
        stopVoice();
      }
    }

    function pickVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const zhVoices = voices.filter(voice => /zh|Chinese|Taiwan|Mandarin/i.test(`${voice.lang} ${voice.name}`));
      state.voice = zhVoices.find(voice => /Taiwan|zh-TW|Mei-Jia|Hanhan/i.test(`${voice.lang} ${voice.name}`))
        || zhVoices[0]
        || voices[0]
        || null;
      return state.voice;
    }

    function speakCurrentPuzzle(force = false) {
      const puzzle = puzzles[state.current];
      speak(`第 ${state.current + 1} 題，${puzzle.title}，${puzzle.author}。請找出四個缺少的字。`, force);
    }

    function speak(text, force = false) {
      if (!("speechSynthesis" in window)) return;
      if (!state.voiceOn && !force) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-TW";
      utterance.rate = 0.84;
      utterance.pitch = 1.08;
      utterance.volume = 1;
      utterance.voice = state.voice || pickVoice();
      window.speechSynthesis.speak(utterance);
    }

    function stopVoice() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function resetGame() {
      state.current = 0;
      state.selected = 0;
      state.filled = [null, null, null, null];
      state.solved = new Set();
      els.modal.classList.remove("show");
      renderPuzzle();
      renderLevelList();
      renderRewards();
      speakCurrentPuzzle();
    }

    function bindControls() {
      els.voiceBtn.addEventListener("click", toggleVoice);
      els.resetBtn.addEventListener("click", resetGame);
      els.againBtn.addEventListener("click", resetGame);
      if ("speechSynthesis" in window) {
        pickVoice();
        window.speechSynthesis.addEventListener("voiceschanged", pickVoice);
      } else {
        els.voiceBtn.disabled = true;
        els.voiceBtn.textContent = "不支援語音";
      }
    }

    init();
  </script>
</body>
</html>
