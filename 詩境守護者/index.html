<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>詩境守護者</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #372412;
      --paper: #fff7dc;
      --gold: #f6b83d;
      --jade: #1c9b83;
      --rose: #d95c57;
      --night: #17364d;
      --sky: #61b8d6;
    }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(246, 184, 61, 0.34), transparent 18rem),
        radial-gradient(circle at 84% 18%, rgba(97, 184, 214, 0.34), transparent 18rem),
        linear-gradient(180deg, #dff5ed, #ffe7a8 58%, #deb264);
      overflow-x: hidden;
    }
    button { color: inherit; font: inherit; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px clamp(12px, 2.5vw, 28px);
      color: #fff8df;
      background: rgba(23, 54, 77, 0.9);
      box-shadow: 0 10px 26px rgba(30, 24, 12, 0.22);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: rgba(255, 248, 223, 0.86);
      font-weight: 900;
      line-height: 1.45;
    }
    .status {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: end;
      flex-wrap: wrap;
    }
    .pill, .btn {
      min-height: 44px;
      display: inline-grid;
      place-items: center;
      padding: 9px 14px;
      border-radius: 8px;
      font-weight: 950;
      white-space: nowrap;
    }
    .pill {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.14);
    }
    .btn {
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, #fff2a8, var(--gold));
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.16);
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn.secondary {
      color: #fff8df;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: none;
    }
    .world {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 24px);
      display: grid;
      grid-template-columns: minmax(240px, 310px) minmax(0, 1fr) minmax(240px, 310px);
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      border: 2px solid rgba(112, 70, 24, 0.22);
      border-radius: 8px;
      background: rgba(255, 247, 220, 0.93);
      box-shadow: 0 18px 44px rgba(46, 28, 8, 0.16);
    }
    .side { padding: 16px; }
    .side h2, .side h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      line-height: 1.25;
    }
    .story-box {
      padding: 14px;
      border-radius: 8px;
      color: #fff8df;
      background:
        radial-gradient(circle at 90% 0%, rgba(246, 184, 61, 0.34), transparent 8rem),
        linear-gradient(145deg, #245b78, #1c9b83);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .story-box p, .coach-card p {
      margin: 0;
      font-weight: 900;
      line-height: 1.6;
    }
    .map {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .map-item {
      min-height: 50px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 30px;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 2px solid rgba(101, 65, 22, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-weight: 950;
    }
    .map-item.active {
      border-color: rgba(28, 155, 131, 0.84);
      background: #e9fff6;
      box-shadow: 0 0 0 4px rgba(28, 155, 131, 0.15);
    }
    .map-item.done {
      border-color: rgba(246, 184, 61, 0.9);
      background: #fff1af;
    }
    .stage {
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }
    .hero {
      position: relative;
      min-height: clamp(220px, 27vw, 330px);
      display: grid;
      grid-template-columns: minmax(150px, 230px) minmax(0, 1fr);
      gap: 16px;
      align-items: end;
      padding: 18px;
      color: #fff8df;
      background:
        linear-gradient(90deg, rgba(23, 54, 77, 0.78), rgba(23, 54, 77, 0.12) 48%, rgba(60, 34, 12, 0.44)),
        url("assets/scroll-guardian.png") center / cover no-repeat;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 48%;
      background: linear-gradient(180deg, transparent, rgba(36, 24, 8, 0.5));
      pointer-events: none;
    }
    .guardian-card {
      position: relative;
      z-index: 2;
      min-height: 148px;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255, 243, 176, 0.7);
      border-radius: 8px;
      background: rgba(255, 247, 220, 0.18);
      box-shadow: 0 0 28px rgba(246, 184, 61, 0.38);
      backdrop-filter: blur(4px);
    }
    .guardian-face {
      width: 108px;
      height: 108px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #7b4300;
      background: radial-gradient(circle, #fff7c4, var(--gold));
      border: 5px solid rgba(255, 255, 255, 0.72);
      font-size: 3rem;
      font-weight: 950;
      box-shadow: 0 0 30px rgba(246, 184, 61, 0.68);
    }
    .hero-copy {
      position: relative;
      z-index: 2;
      max-width: 720px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(20, 35, 42, 0.56);
      box-shadow: 0 12px 28px rgba(20, 18, 12, 0.22);
      backdrop-filter: blur(5px);
    }
    .hero-copy h2 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 3vw, 2.3rem);
      line-height: 1.12;
    }
    .hero-copy p {
      margin: 0;
      font-weight: 900;
      line-height: 1.55;
    }
    .message {
      min-height: 54px;
      display: flex;
      align-items: center;
      margin: 12px 18px 0;
      padding: 10px 14px;
      border-radius: 8px;
      background: #e9ffce;
      border: 2px solid rgba(86, 155, 73, 0.25);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 950;
      line-height: 1.45;
    }
    .message.hint {
      color: #7a4619;
      background: #fff0c7;
      border-color: rgba(246, 184, 61, 0.52);
    }
    .message.win {
      color: #744700;
      background: #fff2a8;
      border-color: rgba(246, 184, 61, 0.84);
      box-shadow: 0 0 26px rgba(246, 184, 61, 0.42);
    }
    .content {
      padding: 16px 18px 18px;
      display: grid;
      gap: 14px;
    }
    .story-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 14px;
      border: 2px solid rgba(112, 70, 24, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
    }
    .emoji {
      width: 84px;
      min-height: 84px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(145deg, #fff7c4, var(--gold));
      font-size: 2.4rem;
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.12);
    }
    .story-text {
      margin: 0;
      white-space: pre-line;
      font-size: clamp(1.08rem, 2vw, 1.32rem);
      font-weight: 900;
      line-height: 1.7;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .choice {
      min-height: 92px;
      padding: 12px;
      border: 2px solid rgba(112, 70, 24, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, #fffdf2, #f6dfaa);
      cursor: pointer;
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      font-weight: 950;
      line-height: 1.45;
      white-space: pre-line;
      text-align: left;
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.12);
    }
    .choice:hover, .choice.selected {
      border-color: var(--jade);
      background: #e9fff6;
    }
    .author-grid {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .author-grid.show { display: grid; }
    .author {
      min-height: 64px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff7c4, var(--gold));
      cursor: pointer;
      font-size: clamp(1.1rem, 2.2vw, 1.55rem);
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(54, 31, 9, 0.14);
    }
    .progress {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 7px;
      margin: 12px 0 16px;
    }
    .gem {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: rgba(17, 108, 117, 0.3);
      background: rgba(255, 255, 255, 0.52);
      font-size: 1.25rem;
      font-weight: 950;
    }
    .gem.on {
      color: #116c75;
      background: #e9fffb;
      box-shadow: 0 0 18px rgba(91, 218, 232, 0.5);
    }
    .badge-card {
      min-height: 92px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 4px solid #36a8bd;
      border-radius: 8px;
      color: #116c75;
      background: rgba(255, 255, 255, 0.52);
      font-size: 1.22rem;
      font-weight: 950;
      text-align: center;
    }
    .coach-card {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
    }
    .sparkle {
      position: fixed;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 240, 168, 0.9), transparent 5rem),
        radial-gradient(circle at 72% 30%, rgba(255, 255, 255, 0.84), transparent 6rem),
        radial-gradient(circle at 50% 72%, rgba(246, 184, 61, 0.72), transparent 7rem);
    }
    .sparkle.show { animation: glow 1.1s ease forwards; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(22, 38, 50, 0.72);
    }
    .modal.show { display: grid; }
    .complete-card {
      width: min(680px, 100%);
      padding: clamp(20px, 4vw, 34px);
      border: 4px solid rgba(246, 184, 61, 0.8);
      border-radius: 8px;
      text-align: center;
      background: var(--paper);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
    }
    .medal {
      width: min(230px, 64vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border: 8px solid #c83f35;
      border-radius: 50%;
      color: #b6342f;
      background: #fff2a8;
      font-size: clamp(1.35rem, 5vw, 2.15rem);
      font-weight: 950;
      line-height: 1.18;
      box-shadow: 0 0 28px rgba(246, 184, 61, 0.54);
    }
    @keyframes glow {
      0% { opacity: 0; transform: scale(0.98); }
      28% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.04); }
    }
    @media (max-width: 1120px) {
      .world { grid-template-columns: 1fr; }
      .side { order: 2; }
      .stage { order: 1; }
      .map { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr; }
      .status { justify-content: start; }
      .hero { grid-template-columns: 1fr; min-height: 300px; }
      .story-panel { grid-template-columns: 1fr; }
      .choices, .author-grid { grid-template-columns: 1fr; }
      .map { grid-template-columns: 1fr; }
      .progress { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>詩境守護者</h1>
        <p class="subtitle">讀生活情境，選出最符合的唐詩，再找出作者。</p>
      </div>
      <div class="status">
        <span class="pill" id="levelPill">第 1 / 9 題</span>
        <span class="pill" id="gemPill">詩魂寶石 ×0</span>
        <a class="btn secondary" href="../index.html" style="text-decoration:none;">← 回到大地圖</a>
        <button class="btn secondary" id="voiceBtn" type="button" aria-pressed="false">開啟語音</button>
        <button class="btn secondary" id="resetBtn" type="button">重新開始</button>
      </div>
    </header>

    <section class="world">
      <aside class="panel side">
        <div class="story-box">
          <h2>守護者任務</h2>
          <p>每一題先讀生活故事，再選詩句，最後找作者。連續完成 9 題，就能成為唐詩守護者。</p>
        </div>
        <h2 style="margin-top: 14px;">冒險地圖</h2>
        <div class="map" id="map"></div>
      </aside>

      <section class="panel stage" aria-label="詩境守護者遊戲">
        <div class="hero">
          <div class="guardian-card" aria-hidden="true">
            <div class="guardian-face">詩</div>
          </div>
          <div class="hero-copy">
            <h2 id="stageTitle">夜晚的旅人</h2>
            <p id="stageIntro">先讀情境故事，再選出最符合的詩句。</p>
          </div>
        </div>

        <div class="message" id="message">請閱讀故事，選出最符合情境的詩句。</div>

        <div class="content">
          <div class="story-panel">
            <div class="emoji" id="emoji">🌙🚢</div>
            <p class="story-text" id="storyText"></p>
          </div>
          <div class="choices" id="choices"></div>
          <div class="author-grid" id="authorGrid"></div>
        </div>
      </section>

      <aside class="panel side">
        <h2>詩魂寶石</h2>
        <div class="progress" id="progress"></div>
        <div class="badge-card" id="badgeCard">詩魂寶石<br>0 / 9</div>
        <div class="coach-card">
          <h3>詩人提示</h3>
          <p id="coach">先想故事裡的心情，再找最像的詩句。</p>
        </div>
      </aside>
    </section>
  </main>

  <div class="sparkle" id="sparkle"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
    <div class="complete-card">
      <div class="medal">唐詩<br>守護者</div>
      <h2 id="completeTitle">詩魂守護者認可你了！</h2>
      <p>你完成 9 題情境理解挑戰，獲得「唐詩守護者」徽章，解鎖「詩仙寶藏」結局動畫。</p>
      <button class="btn" id="againBtn" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        title: "夜晚的旅人",
        mapName: "月夜船行",
        emoji: "🌙🚢",
        story: "你搭著小船旅行。\n夜深了，月亮慢慢落下。\n烏鴉的叫聲傳來，霜氣冷冷的。\n江邊有點點漁火，讓你想著遠方的家。",
        choices: [
          "月落烏啼霜滿天，\n江楓漁火對愁眠。",
          "故人具雞黍，\n邀我至田家。",
          "欲窮千里目，\n更上一層樓。",
          "野火燒不盡，\n春風吹又生。"
        ],
        answer: "月落烏啼霜滿天，\n江楓漁火對愁眠。",
        poem: "楓橋夜泊",
        author: "張繼",
        authors: ["李白", "張繼", "孟浩然", "杜甫"],
        hint: "故事裡有月落、烏啼、霜、江邊漁火。"
      },
      {
        title: "老朋友的邀請",
        mapName: "田家邀請",
        emoji: "🏡🌾",
        story: "有一天，你收到好朋友的邀請卡。\n他請你到鄉下玩。\n到了之後，你看到綠綠的樹、遠遠的青山。\n大家一起吃飯聊天，非常開心。\n離開前，還約好下次節日再見面。",
        choices: [
          "故人具雞黍，\n邀我至田家。",
          "此地一為別，\n孤蓬萬里征。",
          "國破山河在，\n城春草木深。",
          "月落烏啼霜滿天，\n江楓漁火對愁眠。"
        ],
        answer: "故人具雞黍，\n邀我至田家。",
        poem: "過故人莊",
        author: "孟浩然",
        authors: ["孟浩然", "王之渙", "劉禹錫", "白居易"],
        hint: "故事是朋友準備飯菜，邀請你去田家作客。"
      },
      {
        title: "突然傳來的好消息",
        mapName: "喜訊歸家",
        emoji: "🎉🏠",
        story: "戰爭持續了很久。\n大家每天都很擔心。\n有一天，傳來好消息：敵人被打敗了！\n你高興得流下眼淚，迫不及待整理行李，準備帶家人一起回家。",
        choices: [
          "劍外忽傳收薊北，\n初聞涕淚滿衣裳。",
          "昔人已乘黃鶴去，\n此地空餘黃鶴樓。",
          "朱雀橋邊野草花，\n烏衣巷口夕陽斜。",
          "離離原上草，\n一歲一枯榮。"
        ],
        answer: "劍外忽傳收薊北，\n初聞涕淚滿衣裳。",
        poem: "聞官軍收河南河北",
        author: "杜甫",
        authors: ["杜甫", "李白", "崔顥", "王維"],
        hint: "故事是聽到戰爭勝利的消息，開心得流淚。"
      },
      {
        title: "城裡的改變",
        mapName: "燕子古巷",
        emoji: "🏘️🕊️",
        story: "老師帶你到一條古老的街道。\n以前這裡住著許多大官和有錢人。\n現在卻變成一般人居住的地方。\n你看到燕子飛來飛去，想到世界一直都在改變。",
        choices: [
          "舊時王謝堂前燕，\n飛入尋常百姓家。",
          "黃河入海流，\n欲窮千里目。",
          "銀燭秋光冷畫屏，\n輕羅小扇撲流螢。",
          "浮雲遊子意，\n落日故人情。"
        ],
        answer: "舊時王謝堂前燕，\n飛入尋常百姓家。",
        poem: "烏衣巷",
        author: "劉禹錫",
        authors: ["劉禹錫", "杜牧", "王之渙", "賀知章"],
        hint: "故事重點是以前豪門的燕子，現在飛入普通人家。"
      },
      {
        title: "離別的車站",
        mapName: "落日送別",
        emoji: "🎒🌅",
        story: "最好的朋友要搬家了。\n你們一起走到車站。\n夕陽慢慢落下。\n雖然很捨不得，還是微笑揮手說再見。",
        choices: [
          "浮雲遊子意，\n落日故人情。",
          "兒童相見不相識，\n笑問客從何處來。",
          "綠螘新醅酒，\n紅泥小火爐。",
          "黃河入海流，\n欲窮千里目。"
        ],
        answer: "浮雲遊子意，\n落日故人情。",
        poem: "送友人",
        author: "李白",
        authors: ["李白", "孟浩然", "白居易", "劉禹錫"],
        hint: "故事是朋友遠行，夕陽下依依不捨地告別。"
      },
      {
        title: "長高才能看更遠",
        mapName: "高塔遠望",
        emoji: "🏯🌄",
        story: "你來到一座高塔。\n眼前的風景已經很美了。\n可是老師告訴你：如果想看得更遠，就要再往上爬。\n努力學習也是一樣。",
        choices: [
          "欲窮千里目，\n更上一層樓。",
          "國破山河在，\n城春草木深。",
          "離離原上草，\n一歲一枯榮。",
          "月落烏啼霜滿天，\n江楓漁火對愁眠。"
        ],
        answer: "欲窮千里目，\n更上一層樓。",
        poem: "登鸛鵲樓",
        author: "王之渙",
        authors: ["王之渙", "張繼", "杜甫", "王維"],
        hint: "故事說想看更遠，就要再上一層樓。"
      },
      {
        title: "永不放棄的小草",
        mapName: "春風吹草",
        emoji: "🌱🔥",
        story: "草原上的小草被大火燒過。\n大家都以為它不會再長出來。\n可是春天到了，嫩綠的小草又冒出頭來。\n它告訴大家：遇到困難也不要放棄。",
        choices: [
          "野火燒不盡，\n春風吹又生。",
          "孤舟蓑笠翁，\n獨釣寒江雪。",
          "故人具雞黍，\n邀我至田家。",
          "黃鶴一去不復返，\n白雲千載空悠悠。"
        ],
        answer: "野火燒不盡，\n春風吹又生。",
        poem: "賦得古原草送別",
        author: "白居易",
        authors: ["白居易", "柳宗元", "崔顥", "賀知章"],
        hint: "故事是野火燒過後，春風吹來小草又長出來。"
      },
      {
        title: "看見戰爭後的城市",
        mapName: "破城思親",
        emoji: "🏯😢",
        story: "你來到一座城市。\n房屋有些破損，人們離開家園。\n看到盛開的花，反而更想念家人。\n聽見鳥叫聲，心裡更加難過。",
        choices: [
          "感時花濺淚，\n恨別鳥驚心。",
          "綠螘新醅酒，\n紅泥小火爐。",
          "兒童相見不相識，\n笑問客從何處來。",
          "舊時王謝堂前燕，\n飛入尋常百姓家。"
        ],
        answer: "感時花濺淚，\n恨別鳥驚心。",
        poem: "春望",
        author: "杜甫",
        authors: ["杜甫", "李白", "孟浩然", "劉禹錫"],
        hint: "故事是戰亂後看花落淚、聽鳥聲也心驚。"
      },
      {
        title: "消失的黃鶴",
        mapName: "黃鶴古樓",
        emoji: "🦢🌅",
        story: "你站在高高的樓上。\n傳說中的黃鶴早已飛走。\n只剩下一座古老的高樓。\n夕陽西下，你忽然想起遠方的家。",
        choices: [
          "昔人已乘黃鶴去，\n此地空餘黃鶴樓。",
          "浮雲遊子意，\n落日故人情。",
          "野火燒不盡，\n春風吹又生。",
          "故人具雞黍，\n邀我至田家。"
        ],
        answer: "昔人已乘黃鶴去，\n此地空餘黃鶴樓。",
        poem: "黃鶴樓",
        author: "崔顥",
        authors: ["崔顥", "張繼", "白居易", "王之渙"],
        hint: "故事中黃鶴已飛走，只留下黃鶴樓。"
      }
    ];

    const els = {
      levelPill: document.getElementById("levelPill"),
      gemPill: document.getElementById("gemPill"),
      voiceBtn: document.getElementById("voiceBtn"),
      resetBtn: document.getElementById("resetBtn"),
      map: document.getElementById("map"),
      stageTitle: document.getElementById("stageTitle"),
      stageIntro: document.getElementById("stageIntro"),
      message: document.getElementById("message"),
      emoji: document.getElementById("emoji"),
      storyText: document.getElementById("storyText"),
      choices: document.getElementById("choices"),
      authorGrid: document.getElementById("authorGrid"),
      progress: document.getElementById("progress"),
      badgeCard: document.getElementById("badgeCard"),
      coach: document.getElementById("coach"),
      sparkle: document.getElementById("sparkle"),
      modal: document.getElementById("modal"),
      againBtn: document.getElementById("againBtn")
    };

    const state = {
      current: 0,
      phase: "poem",
      solved: new Set(),
      selectedPoem: "",
      audioCtx: null,
      voiceOn: false,
      voice: null
    };

    function init() {
      renderMap();
      renderProgress();
      renderStage();
      bindControls();
    }

    function renderMap() {
      els.map.innerHTML = questions.map((question, index) => `
        <div class="map-item ${index === state.current ? "active" : ""} ${state.solved.has(index) ? "done" : ""}">
          <span>${index + 1}</span>
          <span>${question.mapName}</span>
          <span>${state.solved.has(index) ? "◆" : "◇"}</span>
        </div>
      `).join("");
    }

    function renderProgress() {
      els.progress.innerHTML = questions.map((_, index) => `<div class="gem ${state.solved.has(index) ? "on" : ""}">◆</div>`).join("");
      els.levelPill.textContent = `第 ${state.current + 1} / ${questions.length} 題`;
      els.gemPill.textContent = `詩魂寶石 ×${state.solved.size}`;
      els.badgeCard.innerHTML = `詩魂寶石<br>${state.solved.size} / ${questions.length}`;
    }

    function renderStage() {
      const question = questions[state.current];
      state.phase = "poem";
      state.selectedPoem = "";
      els.stageTitle.textContent = question.title;
      els.stageIntro.textContent = "先讀情境故事，再選出最符合的詩句。";
      els.emoji.textContent = question.emoji;
      els.storyText.textContent = question.story;
      showMessage("請閱讀故事，選出最符合情境的詩句。", "");
      els.coach.textContent = "先想故事裡的心情，再找最像的詩句。";
      els.authorGrid.classList.remove("show");
      renderChoices();
      renderMap();
      renderProgress();
    }

    function renderChoices() {
      const question = questions[state.current];
      els.choices.innerHTML = question.choices.map((choice, index) => `
        <button class="choice" data-choice="${choice}" type="button">${String.fromCharCode(65 + index)}.\n${choice}</button>
      `).join("");
      els.choices.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => choosePoem(button.dataset.choice));
      });
    }

    function renderAuthors() {
      const question = questions[state.current];
      els.authorGrid.innerHTML = question.authors.map(author => `
        <button class="author" data-author="${author}" type="button">${author}</button>
      `).join("");
      els.authorGrid.classList.add("show");
      els.authorGrid.querySelectorAll("[data-author]").forEach(button => {
        button.addEventListener("click", () => chooseAuthor(button.dataset.author));
      });
    }

    function choosePoem(choice) {
      const question = questions[state.current];
      if (choice !== question.answer) {
        showMessage(`詩意提示：${question.hint}`, "hint");
        els.coach.textContent = "別急，回到故事裡找關鍵線索，再試一次。";
        speak(`詩意提示：${question.hint}`);
        return;
      }
      state.phase = "author";
      state.selectedPoem = choice;
      playBell();
      showGlow();
      showMessage(`詩句正確！這是〈${question.poem}〉。現在找出作者。`, "win");
      els.stageIntro.textContent = `詩卷發光：〈${question.poem}〉`;
      els.coach.textContent = "很好，下一步找到這首詩的作者。";
      document.querySelectorAll(".choice").forEach(button => {
        button.classList.toggle("selected", button.dataset.choice === choice);
      });
      renderAuthors();
      speak(`詩句正確！這是${question.poem}。現在找出作者。`);
    }

    function chooseAuthor(author) {
      const question = questions[state.current];
      if (author !== question.author) {
        showMessage(`作者提示：〈${question.poem}〉的作者不是 ${author}，再試一次。`, "hint");
        speak(`作者提示，再試一次。`);
        return;
      }
      state.solved.add(state.current);
      playBell();
      showGlow();
      showMessage(`答對了！〈${question.poem}〉作者是 ${question.author}，獲得詩魂寶石。`, "win");
      els.coach.textContent = "詩人現身點頭：你已經理解這個情境的詩意了。";
      renderProgress();
      renderMap();
      speak(`答對了！${question.poem}作者是${question.author}。獲得詩魂寶石。`);
      window.setTimeout(() => {
        if (state.solved.size === questions.length) {
          localStorage.setItem("cert_poetry", "true");
          els.modal.classList.add("show");
          speak("恭喜獲得唐詩守護者徽章，解鎖詩仙寶藏結局動畫。");
          return;
        }
        const next = questions.findIndex((_, index) => !state.solved.has(index));
        state.current = next >= 0 ? next : state.current;
        renderStage();
      }, 1300);
    }

    function showMessage(text, type) {
      els.message.textContent = text;
      els.message.className = `message ${type}`.trim();
    }

    function showGlow() {
      els.sparkle.classList.remove("show");
      void els.sparkle.offsetWidth;
      els.sparkle.classList.add("show");
    }

    function playBell() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!state.audioCtx) state.audioCtx = new AudioContext();
      const ctx = state.audioCtx;
      const now = ctx.currentTime;
      [220, 293.66, 440].forEach((frequency, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(0.001, now + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.2 / (index + 1), now + 0.09 + index * 0.045);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.9 + index * 0.16);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + index * 0.045);
        osc.stop(now + 2.1 + index * 0.16);
      });
    }

    function toggleVoice() {
      state.voiceOn = !state.voiceOn;
      els.voiceBtn.textContent = state.voiceOn ? "關閉語音" : "開啟語音";
      els.voiceBtn.setAttribute("aria-pressed", String(state.voiceOn));
      if (state.voiceOn) {
        pickVoice();
        speakCurrent();
      } else {
        stopVoice();
      }
    }

    function pickVoice() {
      if (!("speechSynthesis" in window)) return null;
      const voices = window.speechSynthesis.getVoices();
      const zhVoices = voices.filter(voice => /zh|Chinese|Taiwan|Mandarin/i.test(`${voice.lang} ${voice.name}`));
      state.voice = zhVoices.find(voice => /Taiwan|zh-TW|Mei-Jia|Hanhan/i.test(`${voice.lang} ${voice.name}`))
        || zhVoices[0]
        || voices[0]
        || null;
      return state.voice;
    }

    function speakCurrent() {
      const question = questions[state.current];
      speak(`第 ${state.current + 1} 題，${question.title}。${question.story}`);
    }

    function speak(text) {
      if (!("speechSynthesis" in window) || !state.voiceOn) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "zh-TW";
      utterance.rate = 0.84;
      utterance.pitch = 1.06;
      utterance.volume = 1;
      utterance.voice = state.voice || pickVoice();
      window.speechSynthesis.speak(utterance);
    }

    function stopVoice() {
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    function resetGame() {
      state.current = 0;
      state.phase = "poem";
      state.solved = new Set();
      state.selectedPoem = "";
      els.modal.classList.remove("show");
      renderStage();
      speakCurrent();
    }

    function bindControls() {
      els.voiceBtn.addEventListener("click", toggleVoice);
      els.resetBtn.addEventListener("click", resetGame);
      els.againBtn.addEventListener("click", resetGame);
      if ("speechSynthesis" in window) {
        pickVoice();
        window.speechSynthesis.addEventListener("voiceschanged", pickVoice);
      } else {
        els.voiceBtn.disabled = true;
        els.voiceBtn.textContent = "不支援語音";
      }
    }

    init();
  </script>
</body>
</html>
